- year: 2023
  title: The NYC311 App & Community Engagement in Coproducing Municipal Services
  slug: the-nyc311-app-community-engagement-in-coproducing-municipal-services
  authors: Myeong Lee, Xinlin Tang, Ping Wang
  venue: Americas Conference on Information Systems (AMCIS '23). Aug 10-12. Panama
    City, Panama.
  publication_type: Full Paper
  award_note: Selected for Top 25% Papers
  thumbnail: "/assets/images/publications/311.png"
  body: "<p>In the public sector, governments and the people they serve increasingly
    collaborate to coproduce public services. To support the coproduction of municipal
    services, specifically, local governments have incorporated various digital technologies
    into their information systems. How do digital technologies affect community residents'
    engagement in coproducing municipal services? Our analysis of the service requests
    submitted to New York City's municipal 311 system shows that both the introduction
    and use of the NYC311 app were associated with increased request volume in every
    community, but the app's positive effect on community engagement was weaker for
    minority communities, especially those with high percentage of black populations
    at median-low to median-high income levels. These findings help bridge public
    administration and technology perspectives on community engagement by showing
    how ethnoracial and socio-economic factors moderate the effectiveness of digital
    technology. Accordingly, governments are advised to heed these factors when adopting
    digital technology to support public service coproduction.</p>"
  external_link: https://aisel.aisnet.org/amcis2023/sig_egov/sig_egov/12
- year: 2023
  title: 'Two-sided Cultural Niches: Topic Overlap, Geospatial Correlation, and Local
    Group Activities on Event-based Social Networks'
  slug: two-sided-cultural-niches-topic-overlap-geospatial-correlation-and-local-group
  authors: Julia H-P. Hsu, Heejoo Shin, Noseong Park, Myeong Lee
  venue: International Conference on Communities and Technologies (C&T '23). May 29-June
    2. Lahti, Finland.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/candt.png"
  body: |-
    <p>As event-based social networks (EBSNs) such as Meetup.com and Facebook Events gain popularity in managing local events like farmers' markets and social gatherings, they create two-sided cultural niches where event organizers and participants benefit from the platform while influencing each other. Among various factors, niche overlap, an ecological feature, has been studied as a key factor that shapes the success of online communities. While such ecological factors may also shape the success of EBSN-based local groups, the context of EBSNs raises unique challenges in understanding the roles of cultural niches due to the informal nature of these local groups and their geographical embeddedness. In this paper, we examine the effects of Meetup groups' topic overlap and geospatial correlation on the activity levels of both organizers and participants, using one-year Meetup data for 500 cities in the United States. We find that (1) a group's topic overlap with other groups on EBSNs is associated with its activity levels, and (2) local groups' geospatial correlation may moderate the effects of topic overlap for EBSN users, but inconsistently. The results provide a baseline understanding of EBSN-based groups from an ecological perspective.</p>
    <p>* Myeong Lee is the corresponding author.</p>
  external_link: https://doi.org/10.1145/3593743.3593758
- year: 2023
  title: '"I thought I was going to die there:" Socio-political contexts and the plight
    of undocumented Latinx in the COVID-19 pandemic'
  slug: i-thought-i-was-going-to-die-there-socio-political-contexts-and-the-plight-of
  authors: Carol W. Cleaveland, Myeong Lee, Constance A. Gewa
  venue: SSM-Qualitative Research in Health. Vol. 3. 100242. Elsevier.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/latinx.png"
  body: "<p>Certain U.S. population groups have suffered higher rates of infection
    and mortality than whites during the COVID-19 pandemic, including Latinx. Public
    health officials blamed disparities on overcrowded housing and work in essential
    industries prior to the vaccine’s availability. This study (n=34) focuses on the
    intersectionality of social locations for undocumented Latinx immigrants living
    in a relatively affluent suburb and working in the construction and service sectors.
    Their narratives revealed how the pandemic created financial precarity through
    prolonged periods of unemployment and food insecurity. Workers described worry
    over unpaid bills, and potentially catastrophic episodes in which they treated
    severe COVID-19 with home remedies. We argue that long spells of unemployment,
    food insecurity and lack of access to healthcare emerged because of social-political
    contexts including low-wage labor and lack of a safety net.</p>"
  external_link: https://doi.org/10.1016/j.ssmqr.2023.100242
- year: 2023
  title: How Do YouTubers Collaborate? A Preliminary Analysis of YouTubers' Collaboration
    Networks
  slug: how-do-youtubers-collaborate-a-preliminary-analysis-of-youtubers-collaboration
  authors: H. Siraj, A. Machavarapu, J. Hwang, K. Radhakrishnan, S. Adams, J. Kim,
    Myeong Lee
  venue: In iConference 2023 Proceedings. March 27-29. Barcelona, Spain.
  publication_type: Extended Abstract
  award_note: Award for Best Poster, Finalists (top-5)
  thumbnail: "/assets/images/publications/Beauty.png"
  body: "<p>Online videos such as those streamed through YouTube are largely produced
    by individual users rather than traditional mass media, partly due to the incentive
    structure of the platforms. As part of the strategy to increase the audience,
    many content creators collaborate with other creators to attract subscribers and
    diversify their content. This behavior can be conceptualized as “coopetition”
    as they cooperate for their channels’ success while competing with one another
    for the limited pool of audience. In this project, we analyze data about beauty
    and gaming YouTubers to understand their collaboration types and network structures.
    The network analysis suggests that (1) the coopetition networks of YouTubers may
    show a scale-freeness in their topological structure and (2) beauty YouTubers
    cooperate with non-beauty channels more compared to gaming YouTubers, implying
    that YouTubers’ cooperation networks may present a different level of heterogeneity
    depending on topics. The results inform the mechanisms of online video producers’
    cooperation and competition processes from an ecological perspective.</p> <p>*
    This paper is an outcome of the Aspiring Scientists Summer Internship Program
    (ASSIP) at George Mason University, which aims to promote STEM research opportunities
    for high school and undergraduate students. We thank the ASSIP and Dr. Andrea
    Cobb for their support for this study.</p>"
  external_link: https://hdl.handle.net/2142/117376
- year: 2022
  title: 'Towards an Expectation-Oriented Model of Public Service Quality: A Preliminary
    Study of NYC 311'
  slug: towards-an-expectation-oriented-model-of-public-service-quality-a-preliminary
  authors: Julia H.P. Hsu, Jieshu Wang, Myeong Lee
  venue: In International Conference on Social Informatics (SocInfo '22). Springer.
    Oct 19-22. Glasgow, U.K.
  publication_type: Short Paper
  thumbnail: "/assets/images/publications/nyc311.png"
  body: "<p>The 311 system has been deployed in many U.S. cities to manage non-emergency
    civic issues such as noise and illegal parking. To assess the performance of 311-mediated
    public service provision, researchers developed models based on execution time
    and the status of execution. However, research on user satisfaction suggests that
    the level of individuals’ perception is asymmetric with respect to the quality
    of services, because negative experiences have a stronger impact on people’s dissatisfaction
    than positive experiences do for satisfaction. Informed by the uneven nature of
    human satisfaction regarding positive and negative service quality, we propose
    an expectation-oriented model that measures the quality of public services by
    adapting the asymmetric function that reflects different perceptions of positive
    and negative experiences. Our preliminary analysis of the model using the Census
    data provides an initial assessment of the model’s validity. </p> <p><em>* Myeong
    Lee is the corresponding author.</em></p>"
  external_link: https://link.springer.com/chapter/10.1007/978-3-031-19097-1_31
- year: 2022
  title: Exploring Secondary Teachers' Needs and Values in Culturally Responsive Teaching
  slug: exploring-secondary-teachers-needs-and-values-in-culturally-responsive-teaching
  authors: Taylor Stevens, Olga Gkountouna, Myeong Lee
  venue: In Companion of the ACM Conference on Computer Supported Cooperative Work
    and Social Computing (CSCW '22)
  publication_type: Extended Abstract
  thumbnail: "/assets/images/publications/crt.png"
  body: "<p>Value sensitive design (VSD) is a methodology that focuses on examining
    potential stakeholders' values and establishing designers' values of ethical imports
    in designing a technological system. While this approach provides effective ways
    to incorporate users' values in technology design, understanding teachers' values
    in culturally responsive teaching (CRT) poses unique challenges due to their interactions
    with students' cultural identities, school environments, and community contexts.
    This complexity makes it difficult to apply VSD in understanding teachers' values
    on CRT; rather, the values need to be examined in relation to different educational
    contexts in which the teachers are situated. This preliminary study uses a design
    mock-up of a low-fidelity cultural tool to elicit teachers' needs and values on
    CRT and analyzes them against various contexts. The results of the preliminary
    interview analysis provide an initial understanding of how needs, values, and
    educational contexts are intertwined.</p>"
  external_link: https://doi.org/10.1145/3500868.3559473
- year: 2022
  title: 'Evaluating Visitor Engagement Through Instagram: A Case Study of the One
    with Eternity: Yayoi Kusama in the Hirshhorn Collection'
  slug: evaluating-visitor-engagement-through-instagram-a-case-study-of-the-one-with
  authors: Jinyi Kim, Myeong Lee
  venue: In Proceedings of the Association for Information Science and Technology
    (ASIST '22)
  publication_type: Poster
  thumbnail: "/assets/images/publications/kusama.jpeg"
  body: "<p>Museums invite visitors to actively engage in exhibitions. However, it
    is not easy to understand how visitors experience exhibitions, because people’s
    motivations and goals to visit museums vary significantly and, therefore, there
    are no standards to understand their experiences. This research proposes that
    social media postings can provide implications for visitor engagement. Images
    posted on Instagram at an exhibition, One with Eternity: Yayoi Kusama in the Hirshhorn,
    are examined as a case study to explore the use of social media for visitor engagement.
    Preliminary findings based on the qualitative analysis of 964 images from the
    exhibition suggest that Instagram can surface visitors’ experiences with artifacts
    presented in museums: they prefer interactive and immersive experiences in the
    exhibition. This study implies that there are opportunities to extend this approach
    as a means to understand people’s engagement in exhibitions and potentially facilitate
    their interactions through social media.</p> <p>Photo credit: NPR</p>"
  external_link: https://doi.org/10.1002/pra2.705
- year: 2022
  title: 'Delay of Routine Health Care During the COVID-19 Pandemic: A Theoretical
    Model of Individuals'' Risk Assessment and Decision Making'
  slug: delay-of-routine-health-care-during-the-covid-19-pandemic-a-theoretical-model
  authors: Prakriti Shukla, Myeong Lee, Samantha Whitman, Kathleen H. Pine
  venue: Social Science & Medicine (SSM), 307(2022). 115164.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/model.png"
  body: "<p>Delaying routine health care has been prevalent during the COIVD-19 pandemic.
    Macro-level data from this period reveals that U.S. patients under-utilized routine
    health care services such as primary care visits, preventative tests, screenings,
    routine optometry care, dental appointments, and visits for chronic disease management.
    Yet, there is a gap in research on how and why patients understand risks associated
    with seeking or delaying routing health care during an infectious disease pandemic.
    Our research addresses this gap based on semi-structured interviews with 40 participants
    living in regions across the United States. By building upon Unger-Saldaña and
    Infante- Castañeda's model of delayed health care, we extend this model by articulating
    how health care delays happen during an infectious disease pandemic. Specifically,
    we show how perceptions of uncertainty and subjective risk assessments shape people's
    decisions to delay routine health care while they operate at two levels, internal
    and external to one's social bubble, interacting with each other.</p> <p><em>*
    Myeong Lee is the corresponding author. </em></p> <p> </p>"
  citation: 'Prakriti Shukla, Myeong Lee, Samantha A. Whitman, Kathleen H. Pine, Delay
    of routine health care during the COVID-19 pandemic: A theoretical model of individuals’
    risk assessment and decision making, Social Science &amp; Medicine, 307(2022). 115164. ISSN
    0277-9536, <a href="https://doi.org/10.1016/j.socscimed.2022.115164">https://doi.org/10.1016/j.socscimed.2022.115164</a>.'
  external_link: https://www.sciencedirect.com/science/article/pii/S0277953622004701
- year: 2022
  title: 'In Search of Social Justice: The Role of Digital Technology in a Government
    Information System'
  slug: in-search-of-social-justice-the-role-of-digital-technology-in-a-government
  authors: Xinlin Tang, Myeong Lee, Forrest Hangen, Daniel T. O'Brien, Ping Wang
  venue: In Academy of Management Annual Meeting Proceedings (AOM '22) 2022(1), Aug
    5-9. Seattle, U.S.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/social_justice.png"
  body: "<p>In producing and providing services to local residents, municipal governments
    increasingly incorporate digital technology into their Information Systems (IS).
    In these digitally-enhanced government IS, how does digital technology affect
    social justice in the use and outcomes of the systems? By applying theories of
    distributive justice and analyzing data collected from Boston's 311 system for
    residents to request non-emergency services, we have found significant and lasting
    disparities between wealthy and poor communities in the use of the system's digital
    channels (mobile app and website). While digital channels helped all communities
    make more service requests and receive faster responses, heavy use of the digital
    channels exacerbated the disparities between wealthy and poor communities in both
    service request volume and response time. This unexpected finding may be explained
    by the uneven technology adoption trajectories and distributions of repeat users
    in different communities, as our post-hoc analysis shows. By exposing previously
    hidden inequalities in the outcomes of IS, this study justifies the need to bridge
    digital divide at multiple levels, so that efficiency can be gained without sacrificing
    justice. These insights can help reconcile different theories of social justice,
    as well as develop effective government IS.</p>"
  external_link: https://journals.aom.org/doi/abs/10.5465/AMBPP.2022.17481abstract
- year: 2022
  title: 'Social Justice & Technical Efficiency: The Role of Digital Technology in
    Boston''s 311 System'
  slug: social-justice-technical-efficiency-the-role-of-digital-technology-in-bostons
  authors: Ping Wang, Myeong Lee, Forrest Hangen, Daniel T O'Brien, Xinlin Tang
  venue: In European Conference on Information Systems (ECIS 2022) Research Papers.
    117. June 18-24. Timisoara, Romania.
  publication_type: Full Paper
  award_note: Best Full Research Paper, Runner-Up (Top-3)
  thumbnail: "/assets/images/publications/dcu.png"
  body: "<p>Does digital technology help or hinder the realization of social justice
    in government services? Applying theories of distributive justice, we analyzed
    data from Boston's 311 system (for residents to make requests for non-emergency
    services) paired with data from the American Community Survey. We found that,
    as residents used the system's digital channels (website and mobile app) more
    frequently, the number of requests they submitted increased. However, to our surprise,
    the technical efficiency from digital channel use actually exacerbated the disparities
    between wealthy and poor communities in request volume. This unexpected finding
    may be explained by the uneven channel use trajectories and distributions of repeat
    users in different communities, as our additional analysis shows. These results
    not only have exposed previously hidden inequalities but also may help reconcile
    different theories of social justice. Practically speaking, technical efficiency
    and social justice should be balanced when employing digital technology in coproducing
    government services.</p>"
  citation: '<p>Wang, Ping; Lee, Myeong; Hangen, Forrest; O''Brien, Daniel T.; and
    Tang, Xinlin. (2022). "Social Justice &amp; Technical Efficiency: The Role of
    Digital Technology in Boston''s 311 System". European Conference on Information
    Systems (ECIS 2022). 117. <a href="https://aisel.aisnet.org/ecis2022_rp/117">https://aisel.aisnet.org/ecis2022_rp/117</a></p>'
  external_link: https://aisel.aisnet.org/ecis2022_rp/117/
- year: 2022
  title: 'Towards a Socio-technical System of Culturally Responsive Teaching: The
    Interplay between Individuals, Communities, and Resources'
  slug: towards-a-socio-technical-system-of-culturally-responsive-teaching-the
  authors: Taylor Stevens, Myeong Lee, Olga Gkountouna
  venue: 'In ACM CHI Workshop on "There is no justice, just us": Making Mosaics of
    Justice in Social Justice HCI. April 14.'
  publication_type: Workshop Paper
  thumbnail: "/assets/images/publications/crt_sociotech.png"
  body: "<p>Culturally Responsive Teaching (CRT) is a set of instructional practices
    that acknowledges and incorporates students’ identities and backgrounds into the
    classroom in a way that makes learning more effective and relevant for culturally,
    rhetorically, and ethnically diverse students. As classrooms becoming more diverse,
    recognizing and celebrating students’ cultural traits and characteristics are
    becoming increasingly effective to cultivating positive educational outcomes.
    However, most curricula are designed having middle-class white students as the
    main audience, which causes students outside of this group to often be imposed
    to “forget” their own cultural practices and adapt to the “norm”. Due to these
    gaps in the curricula design, an opportunity gap between students of diverse backgrounds
    and those whose backgrounds align more with the focus of the curricula is created.
    Embedding students’ cultural knowledge and experience into the education materials
    can improve their engagement and academic achievement. Further, CRT cultivates
    students’ “cultural integrity and individual abilities” because their backgrounds
    are acknowledged and represented in teaching practices. While CRT directly helps
    students with diverse cultural backgrounds, it is also useful for other students
    as it gives them the opportunity to learn about different cultures and perspectives
    than what they are familiar with. Therefore, it is of the upmost importance to
    create a space where (1) all students are respected and empowered, and (2) their
    differences are acknowledged, discussed, and incorporated in a meaningful manner.
    This will not only help foster a culturally responsive classroom, but one that
    is supporting social justice.</p> <p>As a means to overcome these challenges and
    facilitate CRT- and justice-informed education, we aim to design a socio-technical
    system of CRT practices by creating a “CRT agency” between teachers in diverse
    locations and expertise. As the first step, we investigated how 16 secondary teachers
    understand and implement their students’ cultural identities in the classroom.
    Based on qualitative analyses of the interviews with the teachers, several challenges
    that teachers face emerged involving either the lack of, or abundance of diversity
    in their classrooms. Specifically, the analysis results suggest that challenges
    in CRT stem not only from a lack of awareness and resources, but also from teachers’
    perceptions of students’ diversity and expected education outcomes. In other words,
    our preliminary findings indicate complex interactions between (1) individual-level
    characteristics such as knowledge, perception, and history, (2) school- or community-level
    features such as cultural diversity, curricular requirements, and collective experiences,
    and (3) material resources such as time, budget, and facilities. We argue that
    designing a socio-technical system of CRT practices needs to begin with acknowledging
    these complex interactions. Particularly, designing educational technology for
    CRT as an agency for facilitating CRT practices requires an understanding of how
    the interplays between these factors manifest in classrooms and how the technological
    components embedded in educational practices could mediate or moderate such interplays
    in equitable and effective ways.</p> <p> </p> <p>* This project is led by Taylor
    Stevens, a PhD candidate in the Computational and Data Sciences program at GMU. </p>"
  citation: '<p>Stevens, T., Lee, M., &amp; Gkountouna, O. (2022). Towards a Socio-technical
    System of Culturally Responsive Teaching: The Interplay between Individuals, Communities,
    and Resources. In ACM CHI Workshop on "There is no justice, just us": Making Mosaics
    of Justice in Social Justice HCI. April 14.</p>'
- year: 2021
  title: 'The Effects of Socioeconomic Deprivation on Public Library Book Circulation:
    A Community-level Study'
  slug: the-effects-of-socioeconomic-deprivation-on-public-library-book-circulation-a
  authors: Jongwook Lee, Woojin Kang, Myeong Lee
  venue: Journal of the Korean Library and Information Science, 55(4). pp. 219-243
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/graph.png"
  body: "<p>This study analyzes the effects of community-level socioeconomic deprivations
    (SED) on public libraries’ book circulation in the Seoul metropolitan area. The
    study design draws upon the theory of local information landscapes, which explains
    the relationship between community characteristics and information behavior. Using
    four-year (2015-2018) open government and public library circulation data, we
    constructed a socioeconomic deprivation index by adjusting a multi-dimensional
    deprivation index and generated other variables. Multi-level robust linear regression
    models were used to examine the relationship between SED and public library circulation.
    In addition, we tested the moderating effects of the library collection size and
    the number of libraries per unit area, respectively, on library circulation. The
    results show that there is a significant negative relationship between socioeconomic
    deprivation and library circulation rate. Also, we found that the size of the
    library collection negatively moderates the effects of SED in areas with a large
    number of books, and the number of libraries per unit area was positvely related
    to the library book circulation, not moderating the effects of SED. These findings
    suggest that public libraries and policymakers should consider community characteristics
    in designing strategic plans for public libraries.</p> <p>* Myeong Lee is the
    corresponding author. <br />* This paper is written in Korean. Contact me if you
    need the paper details in English. </p>"
  citation: "<p>Lee, J., Kang, W., &amp; Lee, M. (2021). The Effects of Socioeconomic
    Deprivation on Public Library Book Circulation: A Community-level Study. <em>Journal
    of the Korean Library and Information Science, 55</em>(4). pp. 219-243 </p>"
