  title: 'Care Workers'' Risk Work: How Nannies Manage Invisible Threats in Employers''
    Homes'
  slug: care-workers-risk-work-how-nannies-manage-invisible-threats-employers-homes
  authors: Seungmin Jeong, Jamie Lee, Myeong Lee, Yunan Chen
  venue: "[forthcoming] Proceedings of the CHI Conference on Human Factors in Computing
    Systems (CHI '26). Apr. 13-17. Barcelona, Spain"
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/nanny.jpeg"
  body: "<p>Extending prior HCI and CSCW research on invisible challenges that domestic
    care workers face, we examine how childcare workers, particularly nannies, experience
    and manage workplace risks. Drawing on interviews with 21 full-time nannies, we
    identified three interrelated risks—physical, emotional, and financial—arising
    from structural and relational constraints in employers’ homes. Through the lens
    of risk work, we show how these multi-dimensional constraints create tensions
    that hinder nannies' direct risk mitigation strategies. This often compels them
    to prioritize indirect risk management to avoid tensions, leaving risks themselves
    unresolved. We underscore that these practices consequently leave risks and tensions
    invisible. Our study highlights the need for sociotechnical interventions that
    support both direct and indirect strategies while addressing the underlying constraints
    through enhanced public awareness, thereby making domestic childcare workers’
    workplace risks more visible and better understood.</p>"
- year: 2026
  title: 'Designing for Upstream Work: Learnings from Co-Design for Preventative Solutions
    with Urban Fire Departments'
  slug: designing-for-upstream-work-learnings-from-co-design-for-preventative-solutions
  authors: Rachel Warren, Ruchita Mandhre, Hiba Siraj, G. Mauricio Mejia, Myeong Lee,
    Yunan Chen, Kathleen Pine
  venue: "[forthcoming] Proceedings of the CHI Conference on Human Factors in Computing
    Systems (CHI '26). Apr. 13-17. Barcelona, Spain"
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/fig2.jpeg"
  body: "<p>Public health and social welfare fields increasingly recognize the need
    for preventative interventions that address root causes rather than respond to
    emergent problems – yet face significant challenges in designing tools and demonstrating
    success for such initiatives. We characterize these important, but difficult to
    develop and scale solutions using Dan Heath’s term “upstream work”. We then explore
    design solutions to support upstream work through a multi-phase co-design process
    to assist fire departments developing alternate EMS response programs to reduce
    911 call volume. We contribute to literature on designing to support data practices
    in community organizations and further delineate the key challenge of these programs
    as upstream initiatives: demonstrating success to stakeholders. We then present
    our co-designed prototype, a data dashboard to visibilize and track the outcomes
    of alternate EMS response programs for different stakeholder audiences, and detail
    good practices for designing to support local and community based upstream initiatives.  </p>"
