- year: 2025
  title: 'News Deserts as Information Problems: A Case Study of Local News Coverage
    in Alabama'
  slug: news-deserts-as-information-problems-a-case-study-of-local-news-coverage-in
  authors: Jieshu Wang, Tugce Burcu, Rebecca Ivic, Brian S. Butler, Myeong Lee
  venue: Proceedings of the Association for Information Science and Technology (ASIST
    '25). 62(1). pp. 741-753. Wiley. Nov 14-18. Washington D.C.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/news_deserts.png"
  body: "<p>This paper explores the phenomenon of news deserts as information problems
    to navigate research opportunities and theorize its dynamics. Drawing on the theory
    of local information landscapes, news deserts are conceptualized as more than
    merely an absence of news organizations or content; rather, emphasizing the structural
    and material dimensions of local news ecosystems, such as fragmentation, transience,
    and inconsistent distribution. We argue that news deserts should be understood
    as material pre-conditions of people’s access, interpretation, and engagement
    with information. To empirically ground this framework, we conduct a case study
    in Alabama, using over 30,000 news articles from a local television news operation.
    Through geographic, thematic, and temporal analyses, paired with population and
    crime statistics, we uncover patterns of underreporting, geographic bias, and
    thematic concentration. Our findings demonstrate that news deserts can emerge
    even in areas served by active news outlets, contributing to a broader understanding
    of the uneven distribution of local information, vital for civic engagement and
    community well-being.</p> <p>* Myeong Lee is the corresponding author. </p>"
  external_link: https://doi.org/10.1002/pra2.1293
- year: 2025
  title: 'From Open-Ended Text to Taxonomy: An LLM-based Framework for Information
    Sources for Disability Services'
  slug: from-open-ended-text-to-taxonomy-an-llm-based-framework-for-information-sources
  authors: Julia H.P. Hsu, Myeong Lee
  venue: Proceedings of the Association for Information Science and Technology (ASIST
    '25). 62(1). pp. 915-919. Wiley. Nov 14-18. Washington D.C.
  publication_type: Short Paper
  thumbnail: "/assets/images/publications/hsu_asist.jpg"
  body: "<p>People with disabilities (PWD) and their family members often find it
    difficult to find information about available services. One of the approaches
    to address this information access problem is by understanding the ecology of
    available information sources. However, identifying the landscape of information
    sources is challenging due to the variety of sources and their varying visibility.
    This study proposes a computational approach to processing open-ended survey answers
    by constructing a hierarchical taxonomy of information sources. We developed a
    semi-automated, LLM-based framework to build a taxonomy of information sources
    from open-ended survey answers. The resulting 3-tier taxonomy captures broad categories
    and fine-grained entities, supporting multi-level analysis of information sources.
    This work explores the feasibility of LLM-based taxonomy building and offers a
    scalable framework for processing open-ended texts.</p> <p> </p> <p>* This research
    was supported by the Virginia Board for People with Disabilities (VBPD).</p>"
