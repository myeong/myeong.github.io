- year: 2021
  title: 'Crowdsourcing Behavior in Reporting Civic Issues: The Case of Boston''s
    311 Systems'
  slug: crowdsourcing-behavior-in-reporting-civic-issues-the-case-of-bostons-311-systems
  authors: Myeong Lee, Jieshu Wang, Shawn Janzen, Susan Winter, John Harlow
  venue: In Academy of Management Annual Meeting Proceedings (AOM '21) 2021(1), July
    29-Aug 4.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/311_block_pop.png"
  body: "<p>Many cities in the United States use civic technologies like 311 systems
    as part of their public service systems for monitoring non-emergency civic issues.
    These systems have enhanced the city's monitoring capability by diversifying communication
    channels. However, the data created through these systems is often biased because
    of differences in people's use of technology (i.e., digital divide) and individuals'
    behavioral patterns in providing types of information to the systems. If civic
    data is used by local governments in making informed decisions, these data-driven
    services could be skewed towards the heavy technology users, and not reflect citizens'
    diverse needs. If individuals share similar behavioral patterns or cultural norms
    by neighborhood in reporting civic issues, socio-economic or regional inequality
    could be exacerbated due to the uneven provision of service. This paper aims to
    explore these aspects of civic technologies by examining the relationship between
    community characteristics, individuals' data contribution behavior, and the formation
    of data types. We report results based on Boston's 311 data as a case study.</p>"
  citation: '<p>Lee, M., Wang, J., Janzen, S., Winter, S., &amp; Harlow, J. (2021).
    Crowdsourcing Behavior in Reporting Civic Issues: The Case of Boston''s 311 Systems.
    Academy of Management Annual Meeting Proceedings (AOM). 2021(1). July 29 - Aug
    3. <a class="epub-section__doi__text" href="https://doi.org/10.5465/AMBPP.2021.16532abstract">https://doi.org/10.5465/AMBPP.2021.16532abstract</a></p>'
  external_link: https://journals.aom.org/doi/10.5465/AMBPP.2021.16532abstract
- year: 2021
  title: 'Geographical Disparities of Incidence and Prevalence of Triple-negative
    Breast Cancers: Multistate Study Data Analysis'
  slug: geographical-disparities-of-incidence-and-prevalence-of-triple-negative-breast
  authors: Hyein Jeon, Myeong Lee, Mohammed Jaloudi
  venue: Journal of Clinical Oncology. e12599. 39(15_suppl). In ASCO '21 (June 4-8)
  publication_type: Extended Abstract
  thumbnail: "/assets/images/publications/breast_cancer.png"
  body: "<p>Background:</p> <p>Higher prevalence of triple negative breast cancer
    (TNBC) in black women with associated poor outcomes due to various disparities
    is well documented within a single state. We examine multiple states to better
    understand the state effect on such differences in incidence and prevalence of
    TNBC in black women.</p> <p>Methods:</p> <p>Female patients of ages 19 years old
    and above with breast cancer from the Surveillance, Epidemiology and End Results
    (SEER) Program across 13 states (608 counties) from 2015 (n = 66,444) and 2016
    (n = 66,122) were examined. The relationships between the proportion of black
    and white women and the rate of patients with different tumor subtypes (luminal
    A, luminal B, HR-HER2+, and triple negative) were examined at the county level
    using ordinary least-square regression models. In parallel, due to consideration
    of various state-specific healthcare policies, socio-cultural norms, and socio-economic
    disparities, multi-level regression models were applied to examine the nested,
    random effect of each state on TNBC prevalence in each county. Bonferroni correction
    was applied to reduce the Type I error caused by repeated use of the same variables
    in multiple tests.</p> <p>Results:</p> <p>The baseline breast cancer rates between
    black and white women were similar in the population (0.171% for black and 0.168%
    for white). Consistent to previous studies, we demonstrate a significant positive
    correlation (p &lt; 0.001) in TNBC in black females in both years. Surprisingly,
    when accounted for the random effects on states, 38.2% (2015) and 34.3% (2016)
    increase in incidence of TNBC in black females were seen, suggestive of state-specific
    disparity affecting race-specific health. In 2015, other subtypes of breast cancer
    in both black and white females did not result in significant relationship. Interestingly,
    in 2016, there was a significant relationship seen between the TNBC rate in white
    females and the white female population rate only after adjusting for the state
    effect (p = 0.026). This indicates the impact of non-biological factors such as
    state-wide health policies. Additionally, HR-HER2+ black females had a significant
    relationship against respective population rate only after adjusting for the state
    effect as well (p = 0.0394). For luminal A white females, a 15% decrease in incidence
    was seen after adjusting for state effect (p = 0.0424).</p> <p>Conclusions:</p>
    <p>This is the first known across-state examination of breast cancer subtypes
    by race with random effects on state. This study shows the role of state-specific
    factors affecting incidence in black and white females and potentially indicates
    the importance of state-level management for breast cancer on health disparities
    in addition to race-driven effects. Further studies are needed to elucidate comparable
    differences between states affecting the rates of various subtypes of breast cancer
    and thus health outcomes.</p>"
  citation: "<p>Jeon, H., Lee, M., &amp; Jaloudi, M. (2021). Geographical disparities
    of incidence and prevalence of triple-negative breast cancers: Multistate study
    data analysis. Journal of Clinical Oncology. e12599. 39(15_suppl). DOI: 10.1200/JCO.2021.39.15_suppl.e12599</p>"
  external_link: https://ascopubs.org/doi/abs/10.1200/JCO.2021.39.15_suppl.e12599
- year: 2021
  title: 'Making Sense of Risk Information amidst Uncertainty: Individuals'' Perceived
    Risks Associated with the COVID-19 Pandemic'
  slug: making-sense-of-risk-information-amidst-uncertainty-individuals-perceived-risks
  authors: Kathleen H. Pine, Myeong Lee, Samantha A. Whitman, Yunan Chen, Kathryn
    Henne
  venue: In Proceedings of the 2021 CHI Conference on Human Factors in Computing System.
    pp. 1-15.
  publication_type: Full Paper
  award_note: Honorable Mention Award (Top 5%)
  thumbnail: "/assets/images/publications/chi2021.png"
  body: "<p>COVID-19 has killed hundreds of thousands, constituting a major global
    crisis. Laypeople bear a large burden of responsibility for perceiving risks associated
    with COVID-19 and taking action to manage risks in their everyday lives, yet epidemic-related
    information is characterized by uncertainty and ambiguity. People perceive risks
    based on partial, changing information. We draw on crisis informatics research
    to examine the multidimensional risks people perceive in relation to the COVID-19
    pandemic, the information sources that inform perceptions of COVID-19 risks, and
    the challenges that people have in getting the information they need to understand
    risks, using qualitative interviews with individuals across the United States.
    Participants describe multiple COVID-19 threats including illness, secondary health
    conditions, economic, socio-behavioral, and institutional risks. We further uncover
    how people draw on multiple information sources from technological infrastructures,
    people, and spaces to inform the dimensions of their risk perceptions, uncovering
    deep challenges to acquiring needed risk information.</p> <p>* The first two authors
    are co-first-authors. </p>"
  citation: "<p>Pine, K., Lee, M., Whitman, S., Chen, Y., &amp; Henne, K. (2021). Making
    sense of risk information amidst uncertainty: Individuals' perceived risks associated
    with the COVID-19 pandemic. Proceedings of the 2021 CHI Conference on Human Factors
    in Computing System. pp. 1-15. </p>"
  external_link: https://dl.acm.org/doi/10.1145/3411764.3445051
- year: 2021
  title: 'Multi-Generational Stories of Urban Renewal: Preliminary Interviews for
    Map-based Storytelling'
  slug: multi-generational-stories-of-urban-renewal-preliminary-interviews-for-map-based
  authors: Myeong Lee, Mark Edwin Peterson, Tammy Dam, Bezawit Challa, Priscilla Robinson
  venue: 'In iConference 2021 Proceedings, LNCS. 319-326. Cham: Springer.'
  publication_type: Short Paper
  thumbnail: "/assets/images/publications/ashville.png"
  body: "<p>Urban renewal was a project of the American government that aimed to reconstruct
    poor urban neighborhoods. Because community-level data that shows the underlying
    mechanisms of urban renewal has not been curated in a systematic way, due to the
    complexity and volume of the relevant archival collections, we aim to digitally
    curate property acquisition documents from the urban renewal projects that affected
    the Southside neighborhood of the city of Asheville, North Carolina, in the form
    of a map-based, interactive web application. This paper reports early findings
    from interviews. We analyze how Asheville citizens of different generations remember
    their neighborhood before and after the multiple waves of gentrifications that
    they have experienced, based on personal interviews. The result of this comparative
    analysis provides design implications for the archival system we are developing
    by revealing the inter-generational value structures of potential users.</p>"
  citation: '<p>Lee M., Peterson M.E., Dam T., Challa B., Robinson P. (2021) Multi-generational
    Stories of Urban Renewal: Preliminary Interviews for Map-Based Storytelling. In:
    Toeppe K., Yan H., Chu S.K.W. (eds) <em>Diversity, Divergence, Dialogue. iConference
    2021. Lecture Notes in Computer Science,</em> vol 12646. Springer, Cham. <a href="https://doi.org/10.1007/978-3-030-71305-8_26">https://doi.org/10.1007/978-3-030-71305-8_26</a></p>'
  external_link: https://link.springer.com/chapter/10.1007/978-3-030-71305-8_26
- year: 2020
  title: 'Toward Understanding Civic Data Bias in 311 Systems: An Information Deserts
    Perspective'
  slug: toward-understanding-civic-data-bias-in-311-systems-an-information-deserts
  authors: Myeong Lee, John Harlow, Eric Gordon, Jieshu Wang, Erik Johnston, Shawn
    Janzen, Susan Winter
  venue: 'In CSCW Workshop on Civic Technologies: Research, Practice, and Open Challenges.
    ACM CSCW 2020.'
  publication_type: Workshop Paper
  thumbnail: "/assets/images/publications/civic_bias.png"
  body: "<p>While civic technologies for public issues and services such as 311 systems
    are widely adopted in many U.S. cities, the impact of the emerging civic technologies
    and their datalevel dynamics are unclear. Because the provision patterns of civic
    issues to technological systems are different across neighborhoods and populations,
    it is difficult for city officials to understand whether the provided data itself
    reflects civic issues. Also, the disparities in the information provided to civic
    technologies in different neighborhoods may exacerbate the existing inequality.
    To understand how civic data is created and how people’s use of civic technologies
    plays a role as an intermediary process in shaping community performances, we
    take an information deserts perspective in studying 311 systems. The concept of
    information deserts is informed by a material understanding of local information
    landscapes, making it possible to distinguish local information’s structural features
    from its social-construction process. Based on this theoretical lens, we suggest
    new opportunities for civic technology and data research.</p>"
  citation: "<p>Lee, M., Harlow, J., Gordon, E., Wang, J., Jonston, E., Janzen, S.,
    &amp; Winter, S. (2020). Toward Understanding Civic Data Bias in 311 Systems:
    An Information Deserts Perspective. In<em> CSCW Workshop on Civic Technologies: Research,
    Practice, and Open Challenges, ACM CSCW 2020</em>, Miami, FL. October 17th.</p>"
  external_link: https://www.researchgate.net/publication/349126395_Toward_Understanding_Civic_Data_Bias_in_311_Systems_An_Information_Deserts_Perspective
- year: 2020
  title: A Theoretical Analysis of Independent Business Owners' Preferences for Informal
    Information Sources
  slug: a-theoretical-analysis-of-independent-business-owners-preferences-for-informal
  authors: Joel Chan, Jonathan Brier, Zahra Farhadi, Myeong Lee, Shawn Janzen, Wei-Wei
    Chi, Andrew Fellows, Susan Winter
  venue: In Proceedings of the Association for Information Science and Technology
    (ASIST '20)
  publication_type: Poster
  thumbnail: "/assets/images/publications/asist2020.png"
  body: "<p>Independent business owners often prefer informal information sources
    to formal ones such as library collections. Part of these preferences is rational
    because contextual and application-oriented information is usually available from
    informal sources, which are theoretically the best matches for this kind of information.
    This suggests that, in addition to outreach strategies, efforts to integrate informal
    sources of business-relevant information can improve public libraries' ability
    to support independent business owners' information needs. Through interviews
    with business information providers and users, we explore the multi-dimensional
    space of information needs in independent businesses.</p>"
  citation: "<p>Chan, J., Brier, J., Farhadi, Z., Lee, M., Janzen, S., Chi, W. W., Fellows,
    A. &amp; Winter, S. (2020). A theoretical analysis of independent business owners'
    preferences for informal information sources. Proceedings of the Association for
    Information Science and Technology, 57(1), e352.</p>"
  external_link: https://asistdl.onlinelibrary.wiley.com/doi/full/10.1002/pra2.352
- year: 2020
  title: 'Cultural Activity Diversity and Community Characteristics: An Exploratory
    Study'
  slug: cultural-activity-diversity-and-community-characteristics-an-exploratory-study
  authors: Myeong Lee, Brian S. Butler
  venue: 'In iConference 2020 Proceedings, LNCS. 32-49. Cham: Springer. Boras, Sweden
    (March 23-26).'
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/ldavis.png"
  body: "<p>Cultural diversity has been conceptualized and studied in diverse ways.
    On the one hand, cultural diversity can be conceptualized based on people’s ethnic
    and national backgrounds. On the other hand, cultural dimensions are defined based
    on individuals' behaviors and traits. Sociologists further categorize the latter
    depending on the degree of typicality in cultural artifacts/activities and individuals’
    omnivorousness over cultural tastes. Although each dimension of culture-related
    concepts provides meaningful implications for community-level characteristics,
    it is still unclear how each dimension of cultural characteristics is related
    to other community characteristics. This paper suggests a concept of <em>cultural
    activity diversity</em>, the diversity of cultural activities as a whole in a
    community, and provides an exploratory analysis for the relationships between
    cultural characteristics and socio-economic features across 28 U.S. metropolitan
    areas using local event datasets.</p>"
  citation: '<p>Lee, M. &amp; Butler, B. S. (2020). Cultural Activity Diversity and
    Community Characteristics: An Exploratory Study. In iConference 2020 Proceedings,
    LNCS. 32-49. March 23-26. Borås, Sweden. DOI: <a href="https://doi.org/10.1007/978-3-030-43687-2_3">https://doi.org/10.1007/978-3-030-43687-2_3</a></p>'
- year: 2019
  title: 'Local Information Landscapes: Theory, Measures, and Evidence'
  slug: local-information-landscapes-theory-measures-and-evidence
  authors: Myeong Lee
  venue: Doctoral Dissertation, University of Maryland Press.
  publication_type: Thesis
  award_note: College Nomination for the Doctoral Dissertation Award in iConference
  thumbnail: "/assets/images/publications/dc_maps.png"
  body: |-
    <p>To understand issues about information accessibility within communities, research studies have examined human, social, and technical factors by taking a sociotechnical view. While this view provides a profound understanding of how people seek, use, and access information, this approach tends to overlook the impact of the larger structures of information landscapes that constantly shape peoples access to information. When it comes to local community settings where local information is embedded in diverse material entities such as urban places and technical infrastructures, the e ect of information landscapes should be taken into account in addition to particular strategies for solving information-seeking issues.</p>
    <p>However, characterizing the information landscape of a local community at the community level is a non-trivial problem due to diverse contexts, users, and their interactions with each other. One way to conceptualize local information landscapes in a way that copes with the complexity of the interplay between information, contexts, and human factors is to focus on the materiality of information. By focusing on the material aspects of information, it becomes possible to understand how local information is provided to social entities and infrastructures and how it exists, forming structures at the community level. Through an extensive literature review, this paper develops a theory of local information landscapes (LIL Theory) to better conceptualize the community-level, material structure of local information. Speci cally, the LIL theory adapts a concept of the virtual as an ontological view of the interplay between technical infrastructures, spaces, and people as a basis for assessing and explaining community-level structures of local information. By complementing existing theories such as information worlds and information grounds, this work provides a new perspective on how information deserts manifest as a material precondition of information inequality.</p>
    <p>Using this framework, an empirical study was conducted to examine the explicit e ects of information deserts on other community characteristics. Speci cally, the study aims to provide an initial assessment of LIL theory by examining how the fragmentation of local information, a form of information deserts, is related to important community characteristics such as socio-economic inequality, deprivation, and community engagement. Building upon previous work in sociology and political science, this study shows that the fragmentation of local information (1) is shaped by socio-economic deprivation/inequality that is confounded with ethnoracial heterogeneity, (2) the fragmentation of local information is highly correlated to people's community gatherings, (3) the fragmentation of local information moderates the e ects of socio-economic inequality on cultural activity diversity, and (4) the fragmentation of local information mediates the relationship between socio-economic inequality and community engagement. By making use of three local event datasets over 20 months in 14 U.S. cities (about two million records) and over 3 months in 28 U.S. cities (about 620K records), respectively, this study develops computational frameworks to operationalize information deserts in a scalable way. </p>
    <p>This dissertation provides a theorization of community-level information inequality and computational models that support the quantitative examination of it. Further theorizations of the conceptual constructs and methodological improvements on measurements will bene t information policy-makers, local information system designers, and researchers who study local communities with conceptual models, vocabularies, and assessment frameworks.</p>
    <p> </p>
    <p>* Dissertation Committee: Dr. Brian Butler (Chair), Dr. Vanessa Frias-Martinez, Dr. Grant McKenzie, Dr. Paul Jaeger, and Dr. Hiroyuki Iseki (Dean's Rep)</p>
  citation: "<p>Lee, M. (2019). <em>Local Information Landscapes: Theory, Measures,
    and Evidence</em>. Doctoral Dissertation. College Park, MD: University of Maryland
    Press.</p>"
  external_link: https://drum.lib.umd.edu/handle/1903/25160
- year: 2019
  title: How are Information Deserts Created? A Theory of Local Information Landscapes
  slug: how-are-information-deserts-created-a-theory-of-local-information-landscapes
  authors: Myeong Lee, Brian S. Butler
  venue: Journal of the Association for Information Science and Technology (JASIST),
    70(2). 101-116.
  publication_type: Full Paper
  award_note: Dean's Award for an Outstanding Doctoral Student Paper
  thumbnail: "/assets/images/publications/figure5.jpg"
  body: "<p>To understand issues about information accessibility within communities,
    research studies have examined human, social, and technical factors and contexts
    by taking a socio-technical view. While this view provides a profound understanding
    of how people seek, use, and access information, this approach tends to overlook
    the impact of the larger structures of information landscapes that shape people’s
    access to information. When it comes to local community settings where local information
    is embedded in diverse material entities such as urban places and technical infrastructures,
    the effect of information landscapes should be taken into account in addition
    to particular strategies for solving information seeking issues. However, understanding
    the information landscape of a local community at the community level is a non-trivial
    problem due to diverse contexts and users and their interactions with each other.
    One way to minimize the effects of information, contexts, human factors, and their
    interplay is to focus on the materiality of information (Dourish, 2017). By distinguishing
    the material aspects of information, it becomes possible to understand how local
    information is provided to social entities and infrastructures and how it exists,
    forming a certain structure at the community level. Through an extensive literature
    review, this paper develops a theory of local information landscapes (LIL Theory)
    to better conceptualize the community-level impact of the material structure of
    local information. Specifically, the LIL theory adapts a concept of the virtual
    as an ontological view of the interplay between technical infrastructures, spaces,
    and people as a basis for assessing and explaining community-level structures
    of local information (De Souza e Silva &amp; Sutko, 2011). By complementing existing
    theories such as information worlds (Jaeger &amp; Burnett, 2010) and information
    grounds (Fisher &amp; Naumer, 2006), this paper provides a new perspective on
    how information deserts manifest as a material pre-condition of information inequality.
    Based on these theoretical models, a research agenda is presented for future studies
    in local communities. </p>"
  citation: <p>Lee, M. &amp; Butler, B. S. (2019). How are Information Deserts Created?
    A Theory of Local Information Landscapes.<em> Journal of the Association for Information
    Science and Technology (JASIST), 70</em>(2), 101-119. <a href="https://doi.org/10.1002/asi.24114">https://doi.org/10.1002/asi.24114</a></p>
  external_link: https://onlinelibrary.wiley.com/doi/abs/10.1002/asi.24114
- year: 2018
  title: Identifying Urban Neighborhood Names through User-contributed Online Property
    Listings
  slug: identifying-urban-neighborhood-names-through-user-contributed-online-property
  authors: Grant McKenzie, Zheng Liu, Yingjie Hu, Myeong Lee
  venue: ISPRS International Journal of Geo-Information (IJGI), 7(10). 388. MPDI.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/map_ngrams.png"
  body: <p>Neighborhoods are vaguely defined, localized regions that share similar
    characteristics. They are most often defined, delineated, and named by the citizens
    that inhabit them rather than municipal government or commercial agencies. The
    names of these neighborhoods play an important role as a basis for community and
    sociodemographic identity, geographic communication, and historical context. In
    this work we take a data-driven approach to identifying neighborhood names based
    on the geospatial properties of user-contributed rental listings.  Through a random
    forest ensemble learning model applied to a set of spatial statistics for all
    n-grams in listing descriptions, we show that neighborhood names can be uniquely
    identified within urban settings. We train a model based on data from Washington,
    DC and test it on listings in Seattle, WA and Montreal, QC. The results indicate
    that a model trained on housing data from one city can successfully identify neighborhood
    names in another.  In addition, our approach identifies less common neighborhood
    names and suggestions alternative or potentially new names in each city. These
    findings represent a first step in the process of urban neighborhood identification
    and delineation.</p> <p>This article is included in the Special Issue "Place-Based
    Research in GIScience and Geoinformatics" of the Journal.</p>
  citation: <p>McKenzie, G., Liu, Z., Hu, Y., &amp; Lee, M. (2018). Identifying Urban
    Neighborhood Names through User-contributed Online Property Listings. <em>ISPRS
    International Journal of Geo-Information, 7</em>(10). 388. MPDI. <a href="https://doi.org/10.3390/ijgi7100388">https://doi.org/10.3390/ijgi7100388</a></p>
  external_link: https://www.mdpi.com/2220-9964/7/10/388/pdf
- year: 2018
  title: 'Digital Curation of a World War II Japanese-American Incarceration Camp
    Collection: Implications for Sociotechnical Archival Systems'
  slug: digital-curation-of-a-world-war-ii-japanese-american-incarceration-camp
  authors: Richard Marciano, Myeong Lee, William Underwood, Sandra Laib, Zeynep Diker,
    Aakanksha Singh
  venue: Digital Heritage 2018, International Congress. pp. 1-4. IEEE. Oct 26-30.
    San Francisco, U.S.
  publication_type: Short Paper
  thumbnail: "/assets/images/publications/card_collection.jpg"
  body: <p>We describe computational treatments of archival collections through a
    case study of World War II Japanese-American Incarceration Camps. Camp staff and
    police officers compiled so-called "internal security" reports relating to alleged
    cases of "disorderly conduct, assault, theft, loss of property, and accidents"
    in the camps, and an index to these reports comprising over 25,000 index cards
    to the reports. The sheer size of these collections is pushing archivists and
    researchers to consider new forms of processing for collections at scale. We discuss
    novel digital treatments that involve (1) processing incident cards at scale in
    an automated way, (2) preserving and documenting the record series and their operations
    using an Archival Information Package (AIP), and (3) developing social network-based
    archiving, analysis, and visualization of the collection. Since this type of project
    involves multiple partnerships, agreements, and social interactions with community
    groups and public-sector organizations, we discuss the possibility of the concept
    of sociotechnical archival systems as an implication of our approach.</p>
  citation: "<p>Marciano, R., Lee, M., Underwood, W., Laib, S., Diker, Z., &amp; Singh,
    A. (2018, October). Digital Curation of a World War II Japanese-American Incarceration
    Camp Collection: Implications for Sociotechnical Archival Systems. In <em>Digital
    Heritage 2018, </em><em>The 3rd International Congress</em>. pp. 1-4. San Francisco,
    U.S. doi: 10.1109/DigitalHeritage.2018.8810034</p>"
  external_link: https://ieeexplore.ieee.org/document/8810034
- year: 2018
  title: Towards Understanding Communication Behavior Changes during Floods Using
    Cell Phone Data
  slug: towards-understanding-communication-behavior-changes-during-floods-using-cell
  authors: Lingzi Hong, Myeong Lee, Afra Mashhadi, Vanessa Frias-Martinez
  venue: 'International Conference on Social Informatics (SocInfo ''18). Cham: Springer.
    Sep. 25-28. St. Petersburg, Russia.'
  publication_type: Short Paper
  thumbnail: "/assets/images/publications/senegal.png"
  body: "<p>Natural disasters such as hurricanes, floods or tornadoes affect millions
    of individuals every year. As a result, governments spend millions of dollars
    in emergency response allocating resources to mitigate the damages. Effective
    resource allocation requires a deep understanding of how humans react when a disaster
    takes place. Due to the multiplicity of human behavior, however, it is not trivial
    to understand human behaviors at large scale during and after the disaster. In
    this paper, we explore the use of Call Detail Records (CDR) data to model people’s
    responses to flooding events from the communication perspective in Senegal. Specifically,
    we examine how different levels of flooding affect call volumes and communication
    network features. Our results show that individuals are more active in calling
    behaviors during flooding events than under normal conditions, which might imply
    their support-seeking behavior. Regressions on network features indicate that
    people in a large city in Senegal might have less access to resources outside
    of their neighborhoods and require better infrastructures.</p>"
  citation: "<p>Hong, L., Lee, M., Mashhadi, A., &amp; Frias-Martinez, V. (2018, September).
    Towards Understanding Communication Behavior Changes during Floods Using Cell
    Phone Data. In <em>the International Conference on Social Informatics (SocInfo
    ‘18)</em>, 11186. pp. 97-107. Charm: Springer. </p>"
  external_link: https://link.springer.com/chapter/10.1007/978-3-030-01159-8_9
- year: 2018
  title: 'Toward Identifying Values and Tensions in Designing a Historically-Sensitive
    Data Platform: A Case-Study on Urban Renewal'
  slug: toward-identifying-values-and-tensions-in-designing-a-historically-sensitive
  authors: Myeong Lee, Shiyun Chen, Yuheng Zhang, Edel Spencer, Richard Marciano
  venue: iConference 2018 Proceedings. Springer. March 25-28, Sheffield, U.K.
  publication_type: Short Paper
  thumbnail: "/assets/images/publications/humanface.png"
  body: "<p>Urban renewal was a national initiative from the 1960s through 70s aimed
    at improving so-called “blighted” areas, and resulted in the displacement of many
    vibrant communities. While the underlying mechanisms of urban renewal have been
    examined, there have been very few data-driven, evidence-based studies that take
    into account the histories and interests of former residents. The “Human Face
    of Big Data” project started as a digital curation effort to design and develop
    a web-based, big data platform that provides insights and analytics into the mechanisms
    of this process. However, it was found from user feedback that designing these
    kinds of platforms is not straightforward; rather it needed to be carefully approached
    as diverse values and tensions exist surrounding the design of a historically-sensitive
    data system. This paper aims to report on the digitization and initial system
    design processes, and provide a preliminary design framework constructed using
    a top-down approach. This framework can be used to examine possible dimensions
    of design concerns for historically-sensitive data platforms by system designers.
    Also, human-computer interaction (HCI) and archival science researchers can potentially
    benefit from this new perspective that considers both value sensitivity and archival
    values.</p>"
  citation: '<p>Lee M., Chen S., Zhang Y., Spencer E., &amp; Marciano R. (2018) Toward
    Identifying Values and Tensions in Designing a Historically-Sensitive Data Platform:
    A Case-Study on Urban Renewal. In: Chowdhury G., McLeod J., Gillet V., Willett
    P. (eds) <em>Transforming Digital Worlds. </em><em>iConference</em><em> 2018.
    Lecture Notes in Computer Science, 10766.</em> pp. 632-637. <a href="https://doi.org/10.1007/978-3-319-78105-1_72. ">https://doi.org/10.1007/978-3-319-78105-1_72. </a>Cham: Springer.</p>
    <p><strong>or in short: </strong></p> <p>Lee M., Chen S., Zhang Y., Spencer E.,
    &amp; Marciano R. (2018) Toward Identifying Values and Tensions in Designing a
    Historically-Sensitive Data Platform: A Case-Study on Urban Renewal. In <em>iConference
    2017 Proceedings, 10766</em>. pp. 632-637. Cham: Springer.</p>'
  external_link: https://link.springer.com/chapter/10.1007/978-3-319-78105-1_72
- year: 2017
  title: 'Heuristics for Assessing Computational Archival Science (CAS) Research:
    The Case of the Human Face of Big Data Project'
  slug: heuristics-for-assessing-computational-archival-science-cas-research-the-case
  authors: Myeong Lee, Yuheng Zhang, Shiyun Chen, Edel Spencer, Jhon Dela Cruz, Hyeonggi
    Hong, Richard Marciano
  venue: IEEE Big Data 2017, Workshop on Computational Archival Science, Dec. 11-14,
    Boston, U.S.
  publication_type: Workshop Paper
  thumbnail: "/assets/images/publications/cas.png"
  body: "<p>Computational Archival Science (CAS) has been proposed as a trans-disciplinary
    field that combines computational and archival thinking. To provide grounded evidence,
    a foundational paper explored eight initial themes that constitute potential building
    blocks. In order for a CAS community to emerge, further studies are needed to
    test this framework. While the foundational paper for CAS provides a conceptual
    and theoretical basis of this new field, there is still a need to articulate useful
    guidelines and checkpoints that validate a CAS research agenda. In this position
    paper, we propose heuristics for assessing emerging CAS-related studies that researchers
    from traditional fields can use in their research design stage. The Human Face
    of Big Data project, a digital curation and interface design project for urban
    renewal data, is presented and analyzed to demonstrate the validity of the suggested
    heuristics. Finally, implications for CAS and future work are discussed.</p> <p>The
    full paper is available at the external link (IEEE Big Data 2017 Proceedings pp.
    2262-2270).</p>"
  citation: '<p>Lee, M., Zhang, Y., Chen, S., Spencer, E., Dela Cruz, J., Hong, H.,
    &amp; Marciano, R. (2017, December). Heuristics for Assessing Computational Archival
    Science (CAS) Research: The Case of the Human Face of Big Data Project. <em>The 
    Workshop on Computational Archival Science in IEEE Big Data 2017.</em> pp. 2262-2270.
    Boston, U.S. <a href="https://doi.org/10.1109/BigData.2017.8258179">https://doi.org/10.1109/BigData.2017.8258179</a>.</p>'
  external_link: http://ieeexplore.ieee.org/document/8258179/
- year: 2017
  title: Exploratory Cluster Analysis of Urban Mobility Patterns to Identify Neighborhood
    Boundaries
  slug: exploratory-cluster-analysis-of-urban-mobility-patterns-to-identify-neighborhood
  authors: Myeong Lee, Grant McKenzie, Rajat Aghi
  venue: International Symposium on Location-Based Social Media Data and Tracking
    Data (LSMTD '17). July 1-2. Washington D.C., U.S.
  publication_type: Extended Abstract
  thumbnail: "/assets/images/publications/car2go_density.jpg"
  body: "<p>Defining neighborhood boundaries within a city is a complex and often
    subjective task. Neighborhoods boundaries are defined by the people that visit
    and live in the region, and activities that occur within those boundaries. Depending
    on the individual or group activity being conducted, these boundaries can change
    substantially. Transportation and human mobility patterns offer a novel basis
    on which to explore and delineate neighborhoods. In this work we take a first,
    exploratory step in capturing dynamically changing neighborhoods based on two
    different types of urban mobility data: Car2Go and BikeShare data. Through clustering
    temporal urban mobility signatures of alternative transportation users in Washington,
    D.C., this work provides implications about the characteristics of different types
    of mobility data and research directions.</p> <p>This abstract has been accepted
    for an oral presentation at the symposium, and invited to a special issue submission. </p>"
  citation: "<p>Lee, M., McKenzie, G., &amp; Aghi, R. (2017, July). Exploratory Cluster
    Analysis of Urban Mobility Patterns to Identify Neighborhood Boundaries. <em>Symposium
    on Location-Based Social Media Data and Tracking Data (</em><em>LSMTD</em><em>)</em>.
    Washington D.C., U.S.</p>"
  external_link: https://myeonglee.com/sites/default/files/documents/Lee_urban_mobility.pdf
- year: 2017
  title: A Tool for Estimating and Visualizing Poverty Maps
  slug: a-tool-for-estimating-and-visualizing-poverty-maps
  authors: Myeong Lee, Rachael Dottle, Carlos Espino, Imam Subkhan, Ariel Rokem, Afra
    Mashhadi
  venue: NetMob 2017, April 5-7, Milan, Italy.
  publication_type: Extended Abstract
  thumbnail: "/assets/images/publications/dashboard1.png"
  body: <p>"Poverty maps" are designed to simultaneously display the spatial distribution
    of welfare and different dimensions of poverty determinants. The plotting of such
    information on maps heavily relies on data that is collected through infrequent
    national household surveys and censuses. However, due to the high cost associated
    with this type of data collection process, poverty maps are often inaccurate in
    capturing the current deprivation status. In this paper, we address this challenge
    using a methodology that relies on alternative data sources from which to derive
    up-to-date poverty indicators, at a very fine level of spatial granularity. We
    validate our methodology for the city of Milano and demonstrate how it could be
    used to implement a poverty mapping tool for policy-makers.</p> <p>This project
    has been conducted as one of the major projects at the 2016 Data Science for Social
    Good (DSSG) summer program at the University of Washington's eScience Institute. I
    am grateful to have the opportunity to work on this project -- I learned a lot
    from our great mentors Dr. Afra Mashhadi and Dr. Ariel Rokem, and also from my
    colleagues Rachael, Carlos, and Imam. </p> <p>The abstract has been invited for
    an oral presentation at the NetMob conference.</p>
  citation: <p>Lee, M., Dottle, R., Espino, C., Subkhan, I., Rokem, A., &amp; Mashhadi,
    A. (2017). A tool for estimating and visualizing poverty maps. In <em>NetMob 2017.
    </em>Retrieved from <a href="http://netmob.org/assets/img/bookofabstract_oral_2017.pdf">http://netmob.org/assets/img/bookofabstract_oral_2017.pdf</a></p>
  external_link: http://netmob.org/assets/img/bookofabstract_oral_2017.pdf
- year: 2016
  title: 'Toward an Ecology Theory of Creativity in IT Products: A Study of Mobile
    Device Industry'
  slug: toward-an-ecology-theory-of-creativity-in-it-products-a-study-of-mobile-device
  authors: Ping Wang, Myeong Lee, Xu Meng, Brian Butler
  venue: International Conference on Information Systems (ICIS '16). Dec. 11-14, Dublin,
    Ireland.
  publication_type: Full Paper
  award_note: Best Paper Award (1st place)
  thumbnail: "/assets/images/publications/cluster_map.jpg"
  body: "<p>In a creative process, divergent thinking needs to be stimulated to generate
    novel ideas; yet these ideas must be synthesized to produce something valuable.
    Hence to foster creativity in developing IT products, creators need to manage
    the tension between novelty and value. Since the forces affecting the novelty-value
    tension often exist outside a creator's group or organization, we apply organizational
    ecology theory to propose an industry-level, ecological model for understanding
    the novelty of IT products. Analyzing data on 2,903 mobile devices developed by
    156 firms worldwide over a ten-year period, we found that legitimation of the
    products in a market niche and competition between market niches enhanced product
    novelty. However, not all kinds of competition stimulated novelty. Competition
    within each niche hampered novelty. This ecological perspective contributes to
    creative IT/IS research and has the potential to bridge studies of creativity
    and digital innovation.</p> <p> </p>"
  citation: "<p>Wang, P., Lee, M., Meng, X., &amp; Butler, B. (2016, December). Toward
    an Ecology Theory of Creativity in IT Products: A Study of Mobile Device Industry.
    In <em>37th International Conference on Information Systems (ICIS)</em>. pp. 1-20.
    Dublin, Ireland.</p>"
  external_link: http://aisel.aisnet.org/icis2016/GeneralIS/Presentations/5/
- year: 2016
  title: 'This Is Not Just a Cafe: Toward Capturing the Dynamics of Urban Places'
  slug: this-is-not-just-a-cafe-toward-capturing-the-dynamics-of-urban-places
  authors: Myeong Lee, Rosta Farzan, Brian Butler
  venue: International AAAI Conference on Web and Social Media (ICWSM '16), The CityLab
    Workshop. May 17-20, Cologne, Germany.
  publication_type: Workshop Paper
  thumbnail: "/assets/images/publications/place.jpg"
  body: "<p>Social media has provided a huge amount of user-generated data in capturing
    urban dynamics. Among them, place-level human behavior has been largely detected
    through people’s check-in records at certain places. Conventionally, places are
    characterized by a set of pre-defined features, often specified by the owner of
    the places. In this paper, we argue that capturing socially-meaningful features
    and dynamics of an urban place may also be done by analyzing human activity traces.
    We explore the activity-centered representation of urban places as a foundation
    for understanding local neighborhoods at scale. We analyze activities from several
    venues using data from MeetUp, a popular local event organizing service. Then,
    Yelp’s business information was used to triangulate the analysis. The results
    suggest that strategies based on local event data have great potential for modeling
    socially-meaningful urban places at large scale.</p> <p>(Photo from Yelp.com)</p>"
  citation: "<p>Lee, M., Farzan, R., &amp; Butler, B. (2016, May). This is Not Just
    a Café: Toward Capturing the Dynamics of Urban Places. In <em>The CityLab Workshop
    in 10th International AAAI Conference on Web and Social Media (ICWSM</em><em>)
    </em>. pp. 20-25. Cologne, Germany.</p>"
  external_link: http://www.aaai.org/ocs/index.php/ICWSM/ICWSM16/paper/view/13230
- year: 2016
  title: 'Unlocking the Archives of Displacement and Trauma: Revealing Hidden Patterns
    of Exploring New Modes of Public Access through Innovative Partnerships and Infrastructure'
  slug: unlocking-the-archives-of-displacement-and-trauma-revealing-hidden-patterns-of
  authors: Diane Travis, Myeong Lee, Magdalena Rojas, Allison Gunn, Anuj Nimkar, Gregory
    Jansen, Nicholas Diakopoulos, Richard Marciano
  venue: Archiving Conference 2016 Proceedings. April 19-22. Washington D.C., U.S.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/campmap.png"
  body: "<p>This paper describes innovative partnerships: university - federal agency
    (between the University of Maryland and the Office of Innovation at the National
    Archives and Records Administration - NARA) and university - industry (between
    the College of Information Studies or “iSchool” at the University of Maryland
    and Archive Analytics Solutions Ltd.) where we are developing automated scalable
    workflows that involve digitization, OCR, information extraction, and linking
    into interactive maps and graph databases, and where digital preservation and
    archiving are performed using an innovative NoSQL Cassandra-based archival catalog
    and NetApp-based peta-scale storage infrastructure. This is a contribution to
    linking sensitive dispersed cultural resources involving the archives of displacement
    and trauma.</p>"
  citation: '<p>Travis, D., Lee, M., Rojas, M., Gunn, A., Nimkar, A., Jansen, G.,
    Diakopoulos, N., &amp; Marciano, R. (2016, April). Unlocking the Archives of Displacement
    and Trauma: Revealing Hidden Patterns of Exploring New Modes of Public Access
    through Innovative Partnerships and Infrastructure. In <em>Archiving Conference.
    Society for Imaging Science and Technology, 2016</em>(1). pp. 135-139. Washington
    D.C. <a href="https://doi.org/10.2352/issn.2168-3204.2016.1.0.135">https://doi.org/10.2352/issn.2168-3204.2016.1.0.135</a>.</p>'
  external_link: http://www.ingentaconnect.com/contentone/ist/ac/2016/00002016/00000001/art00030?crawler=true
- year: 2015
  title: '"What Makes a Place More Familiar?": Implications of Geospatial Information
    Format and Content'
  slug: what-makes-a-place-more-familiar-implications-of-geospatial-information-format
  authors: Myeong Lee, Luis Santos, Wei Zhao, Preeti Lakhole, Brian Butler
  venue: ACM Conference on Human Factors in Computing Systems (CHI '15). April 18-23.
    Seoul, Korea.
  publication_type: Extended Abstract
  body: "<p>Geo-local systems can significantly increase users' familiarity with new
    places. However, for these systems to be useful, geospatial information needs
    to be presented in ways that those systems can minimize users' difficulties of
    learning about a new place. This raises a fundamental question about what kinds
    and representations of geospatial information are effective in making a place
    more familiar, so that people can adjust to the place more easily even before
    visiting the unfamiliar world. This study focuses on modeling representations
    of geospatial information, and their effects on people's familiarity of places.
    The results show that content and format of geospatial information matter in their
    familiarity about a place in terms of their perceptions and knowledge. Designers
    and researchers of social computing systems can benefit from this study so that
    geospatial information can be more effectively distributed through online systems.</p>
    <p>This project was originally initiated as a class project from the INST 741
    (Social Computing) class in 2013, and was redesigned as a research project and
    accepted to the CHI '15 Work-in-progress session. I organized a 4-member team
    and we collaborated on designing this study as a team. The video was created originally
    for Social Media Expo, iConfernece 2014, so the title is different from that of
    the CHI paper. This research project tried to identify the effect of geospatial
    information format (image or text) and content (place or space) on people's familiarity
    with new places.</p>"
  citation: '<p>Lee, M., Santos, L., Zhao, W., Lakhole, P., &amp; Butler, B. (2015).
    What Makes a Place More Familiar?: Implications of Geospatial Information Format
    and Content. In <em>Proceedings of the 33rd Annual ACM Conference Extended Abstracts
    on Human Factors in Computing Systems (CHI EA ''15)</em>. pp. 1079-1084. <a href="http://dx.doi.org/10.1145/2702613.2732911">http://dx.doi.org/10.1145/2702613.2732911</a>.
    New York, NY: ACM.</p>'
  external_link: https://dl.acm.org/citation.cfm?id=2732911
  thumbnail: "/assets/images/publications/chi15_place.jpg"
  video: "/assets/videos/chi15_place.mp4"
- year: 2015
  title: 'Motherhood and Social Networking Sites: How do sociocultural contexts and
    technological factors affect Korean mothers'' KakaoStory use?'
  slug: motherhood-and-social-networking-sites-how-do-sociocultural-contexts-and
  authors: Jinyoung Kim, Myeong Lee, Chiyoung Oh
  venue: iConference 2015 Proceedings. March 24-27. Newport Beach, U.S.
  publication_type: Full Paper
  award_note: Lee Dirks Award for Best Paper, Runner-Up (top 5)
  thumbnail: "/assets/images/publications/kakao.jpg"
  body: "<p>In this paper, we investigate the role of sociocultural contexts and technological
    characteristics in user behaviors on social networking sites (SNSs). This study
    focuses on Korean mothers’ social roles and their use of KakaoStory—one of the
    most popular SNSs in Korea. Through interviews with fifteen Korean mother users,
    this research studies changing social roles of Korean mothers with childbirth,
    and its influence on KakaoStory use. Also, we investigate how KakaoStory’s unique
    characteristics affect mothers’ usage. The results of this study reveal that the
    primary child caregiver role of Korean mothers influences them to use KakaoStory
    to seek informational supports for childrearing and to perform their mothering
    duties. The photo-driven user interface and private service characteristic of
    KakaoStory fitted to the mothers’ need to share photos of children, with a restricted
    group of people. This study shed lights on the importance of the socio-technical
    perspective in the social media research.</p> <p>I participated in this project
    as a second author and (1) co-coded the interview data using Dedoose; (2) collaborated
    on identifying the research question; (3) wrote a part of introduction and discussions
    (technological factors and KakaoStory use). This study tried to understand Korean
    mothers' social media uses that were affected by socio-cultural and technological
    factors. </p>"
  citation: '<p>Kim, J., Lee, M., &amp; Oh, C. (2015, March). Motherhood and Social
    Networking Sites: How do sociocultural contexts and technological factors affect
    Korean mothers’ KakaoStory use? In <em>iConference 2015 Proceedings</em>. Newport
    Beach, U.S. <a href="http://hdl.handle.net/2142/73668">http://hdl.handle.net/2142/73668</a></p>'
  external_link: https://myeonglee.com/sites/default/files/documents/iConf2015_mothers_Jan4_CameraReadyJKim.pdf
- year: 2014
  title: Information Behavior of International Students Settling in an Unfamiliar
    Geo-spatial Environment
  slug: information-behavior-of-international-students-settling-in-an-unfamiliar
  authors: Chiyoung Oh, Brian Butler, Myeong Lee
  venue: Proceedings of the Association for Information Science and Technology (ASIST
    '14). Oct 31-Nov 5. Seattle, U.S.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/asist.jpg"
  body: "<p>This paper presents the findings from a project about how international
    students seek and acquire information during their settlement in an unknown geo-spatial
    environment. Through semi-structured interviews, questionnaires, and cognitive
    mapping with twenty international students, this study examines their information
    needs, information sources, and settlement experiences in the host country. Findings
    of the study include their (1) focus on acquiring basic, survival-related information;
    (2) active use of internet-based information sources including online/mobile maps;
    (3) information behavior of wandering around and information encountering; (4)
    co-national social networks playing a key role as information sources. Implications
    are discussed in ways to further our understanding of international students’
    information behavior and promote its improvement.</p> <p>* I participated in this
    research project as an assistant interviewer/co-coder for the interview data and
    wrote a part of the paper.</p> <p>* Chiyoung Oh, the first author of this paper,
    received <em>The Dean’s Award for an Outstanding </em><em>iSchool</em><em> Doctoral
    Student Paper</em> (UMD) in 2015. Congratulations!</p>"
