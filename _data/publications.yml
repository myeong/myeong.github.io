  title: 'Spatial Dynamics of Local News: Mapping City Co-Mentions in Alabama'
  slug: spatial-dynamics-of-local-news-mapping-city-co-mentions-in-alabama
  authors: Jieshu Wang, Tugce Burcu, Brian S. Butler, Myeong Lee
  venue: Proceedings of the Association for Information Science and Technology (ASIST
    '25). 62(1). pp. 1708-1710. Wiley. Nov 14-18. Washington D.C.
  publication_type: Extended Abstract
  thumbnail: "/assets/images/publications/cooccuring.png"
  body: "<p>This study investigates how the relationships between cities are represented
    in local news by analyzing co-mentions of cities in 31,004 news articles from
    Alabama. Using a large language model, we extract geographic references and construct
    co-mention networks that reflect both spatial proximity and symbolic connections.
    To interpret these links, we develop a classification framework of relationships
    between cities, including common impacts and sequential dynamics. Our preliminary
    analysis reveals that different news categories produce distinct patterns of spatial
    association. This approach offers a novel methodology and a new lens for understanding
    media-driven spatial imaginaries, contributing to research on information geographies
    and shedding light on the relational dimensions of local information.</p>"
