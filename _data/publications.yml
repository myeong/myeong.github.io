- year: 2023
  title: 'Aggregate-Level Analysis of Information Behavior: A Study of Public Library
    Book Circulation'
  slug: aggregate-level-analysis-of-information-behavior-a-study-of-public-library-book
  authors: Myeong Lee, Jongwook Lee, Woojin Kang, Sanghee Oh
  venue: In Proceedings of the Association for Information Science and Technology
    (ASIST '23)
  publication_type: Extended Abstract
  thumbnail: "/assets/images/publications/bookloans.png"
  body: "<p>Information behavior research to date has mainly focused specific cases
    or representative surveys at the individual level, because each individual has
    unique contexts that shape their behavior. However, they have not fully benefited
    from aggregate-level analyses due to mainstream theories’ focus on a contextualized
    understanding of information. To address this gap, we adopt the theory of local
    information landscapes, that focuses on the material aspects of community dynamics,
    and analyze national-level aggregate data on book circulations in public libraries
    across South Korea. By examining the relationship between socioeconomic status
    and public library book circulation, we discuss the potential to develop scalable
    theories and relevant data-driven approaches in information behavior research.</p>"
