  publication_type: Full Paper
  thumbnail: "/assets/images/publications/dropout.png"
  body: <p align="left"><strong>Purpose:</strong> Adolescent school dropout remains
    a major concern in the United States, accounting for 5.3% of the entire high school
    students in 2022. This study aims to investigate the relationships between socioeconomic
    status (SES), the availability of mental health and substance use treatment facilities,
    and school dropout rates across thirteen states.</p> <p align="left"><strong>Method:</strong>
    We used geospatial and machine learning techniques to integrate datasets and impute
    missing values. Regression analyses were used to examine the relationships among
    SES, service availability, and dropout rates.</p> <p align="left"><strong>Results:</strong>
    Our findings suggest that computational techniques can help conduct multi-state
    analysis of educational data. The availability of services negatively moderates
    the relationship between SES and dropout.</p> <p align="left"><strong>Discussion:</strong>
    This study demonstrates the potential of geospatial and machine learning techniques
    for multi-level analysis. The findings provide implications for social work, public
    policy, and education, indicating that community-level resources may serve as
    protective factors in supporting youth educational continuity.</p> <p align="left"> </p>
    <p align="left">* This article has been accepted to the Special Issue on <em>Emerging
    Computational Approaches for Social Work Research and Practice</em>.</p> <p align="left">*
    Myeong Lee is the corresponding author. </p> <p align="left">* This research was
    supported in part by the Institute for Digital InnovAtion (IDIA) at George Mason
    University.</p>
