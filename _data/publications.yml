- year: 2026
  title: 'Disability Misinformation on Facebook: A Comparison of LLM-based Fact-Checking
    Tools'
  slug: disability-misinformation-on-facebook-a-comparison-of-llm-based-fact-checking
  authors: Ian Prazak, Leah Padovani, Yool Lim, Julia H.P. Hsu, Myeong Lee
  venue: Information Research an international electronic journal (iConference). 31(iConf(2026)).
    pp. 1042-1053. Mar. 29-Apr. 2. Edinburgh, U.K.
  publication_type: Short Paper
  thumbnail: "/assets/images/publications/Fig2_a.jpg"
  body: "<p>Social media has become a prominent space for seeking and sharing information,
    but it also enables misinformation to spread. When it comes to disability-related
    information, such as how to apply for a Medicaid waiver, understanding and detecting
    the prevalence of false information on social media becomes further complicated
    due to varying policies that keep changing over time. To provide an initial exploration
    of this problem space, we investigated misinformation propensity within disability-related
    Facebook groups, organizational factors associated with it, and how AI fact-checking
    tools perform in detecting this type of information. We first identified target
    Facebook groups from a large-scale survey. From 20 public Facebook groups mentioned
    in the survey, we web-scrapped 1,407 informational and fact-checkable posts. GPT-4o,
    GPT-o1, and Originality.ai were used to classify posts. The results were validated
    against the ground-truths generated manually. Our findings reveal that groups
    centered on developmental disabilities are more vulnerable to misinformation.
    AI fact-checking tools proved effective in classifying accurate information but
    presented varying performance in detecting misinformation. This work provides
    a preliminary assessment of the prevalence of misinformation and the performance
    of LLM-based tools.</p> <p>* This paper is an outcome of the ASSIP internship
    at Mason, designed for high school and undergraduate students, in 2024.</p>"
