- year: 2024
  title: An Evaluation of GPT-4V for Transcribing the Urban Renewal Hand-Written Collection
  slug: an-evaluation-of-gpt-4v-for-transcribing-the-urban-renewal-hand-written
  authors: Myeong Lee, Julia H.P. Hsu
  venue: In Digital Humanities (DH 2024). ADHO. Aug. 6-9. Arlington, VA.
  publication_type: Short Paper
  award_note: Conference Bursary Award
  thumbnail: "/assets/images/publications/ur.png"
  body: "<p>In November 2024, OpenAI released GPT- 4V(ision), which includes Optical
    Character Recognition (OCR) capabilities. Given that much of the data curation,
    processing, and cleaning can be managed through user-friendly prompts (i.e., chat),
    we aim to conduct an initial assessment of GPT-4V’s effectiveness in transcribing
    hand-written documents from the urban renewal collection. If GPT-4V can accurately
    digitize hand-written documents through carefully crafted prompts, it could become
    a valuable tool for nonexperts in transcribing historical documents on a large
    scale. Alternatively, if it falls short, it is still crucial to understand and
    discuss the implications of using Large Language Models (LLMs) for digitizing
    archival documents.</p> <p>This paper evaluates GPT-4V’s performance in transcribing
    the cover pages of selected urban renewal documents. These cover pages, all handwritten
    and generally more challenging to read (even for humans) compared to other parts
    of the documents, are valuable for researchers and practitioners focusing on urban
    renewal, as they succinctly provide key information about property acquisition
    processes. Figure 1 shows an example of an original document.</p> <p> </p> <p>*
    Acknowledgments: We thank Ms. Priscilla Robinson and Dr. Richard Marciano for
    their continuing collaboration and the scanning of the archival documents.</p>"
- year: 2024
  title: 'Examining the Shift in Political Inclination of Korean Middle School Language
    Textbooks between the Independence and the Korean War (1945-1953): A Network Modeling
    Approach'
  slug: examining-the-shift-in-political-inclination-of-korean-middle-school-language
  authors: Eunji Lee, Myeong Lee
  venue: In Digital Humanities (DH 2024). ADHO. Aug. 6-9. Arlington, VA.
  publication_type: Short Paper
  thumbnail: "/assets/images/publications/korean.jpg"
  body: <p>This study leverages network modeling methodologies to examine the distribution
    of political inclinations in Korean middle school language textbooks from 1945
    to 1953. The textbooks included in this study are 82 textbooks, where 37 of which
    from the U.S. military government period (1945-1948), 30 of which from the South
    Korean government establishment period (1948-1950), and 15 of which from the wartime
    period (1950-1953). Literature textbooks are excluded from this study due to their
    inherent nature of containing more writings by contemporary authors, which could
    present biases in political leaning within the language arts field. We curated
    the textbook data by combining the list of past textbooks organized in various previous
    studies (Oh, 2009; Park, 2012; Heo, 2013) and additional books directly found
    from the National Library of Korea (<a href="https://nl.go.kr">https://nl.go.kr</a>)
    and the National Museum of Korea (<a href="https://emuseum.go.kr">https://emuseum.go.kr</a>).</p>
    <p>Specifically, we constructed a contributor co-occurrence network using six
    sample textbooks published between 1947 and 1952). Assuming that contributors
    to a textbook are more likely to invite others who share similar political views,
    we initially create a network of contributors based on their co-occurrences in
    textbooks. Each contributor is then represented as a vector of co-occurrences
    with all other individuals. We calculate the distance between two contributors
    based on the inversed cosine similarity between their vectors. These pairwise
    distances form the basis for calculating political inclination scores. We establish
    An Ho-Sang as the baseline right-wing individual (so we set his political leaning
    score as 1), acknowledging his status as a well-known far-right-wing author with
    political influence (Lee, 2005). Other contributors’ political leaning scores
    are then calculated by subtracting their inversed cosine similarity values from
    1. Finally, we standardize the range of scores so that the scores vary between
    0 and 1. To validate this method, we compared the resulting scores against known
    political leanings—left-wing, right-wing, or neutral—that were manually assigned
    (“unknowns” are removed in the validation). Figure 2 presents boxplots that compare
    known political leanings with the calculated scores. The differences in scores
    are statistically significant across the groups, as determined by ANOVA (F[2,
    51] = 21.96, p &lt; 0.001), confirming the method's validity.</p> <p> </p>
- year: 2024
  title: Exploring Domestic Workers' Risk Work During the COVID-19 Pandemic
  slug: exploring-domestic-workers-risk-work-during-the-covid-19-pandemic
  authors: Hiba Siraj, Samantha Whitman, Kathleen Pine, Myeong Lee
  venue: iConference 2024 Proceedings. April 22-26. Changchun, China.
  publication_type: Extended Abstract
  thumbnail: "/assets/images/publications/domestic.jpg"
  body: "<p>While many occupations turned to remote work during the COVID-19 pandemic,
    domestic work by definition requires workers to enter other people’s households,
    and they often work in close proximity to their employers. With domestic workers
    proactively handling COVID19 risks as part of their already precarious jobs, there
    is a need for a conceptual understanding of risk management to aid this occupational
    group during a public health crisis. Our findings emerge from a preliminary qualitative
    study interviewing occupational groups who adopted risk work practices during
    the pandemic, providing insight into their risk perceptions and practices. In
    this paper, we focus on the 6 paid domestic worker participants recruited to investigate
    how they engaged in situated ‘risk calculations’ to assess the COVID-19 risk presented
    at work and weigh against other different risks present. This paper invites an
    initial discussion on risk practices, communication, and policy to support domestic
    workers during crises.</p>"
