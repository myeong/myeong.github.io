- year: 2014
  title: '"I know where that is": Cultural Differences in Perception of New Places'
  slug: i-know-where-that-is-cultural-differences-in-perception-of-new-places
  authors: Myeong Lee, Brian Butler
  venue: MIM Thesis, UMD iSchool & Poster at the iConference 2014 Proceedings, Berlin,
    Germany
  publication_type: Thesis
  thumbnail: "/assets/images/publications/web.jpg"
  body: '<p>This research project had been conducted for my master''s thesis (Master
    of Information Management degree). I conceptualized cultual background with Hall''s
    high- and low-context culture (1976) and tried to see whether people''s perceptions
    of urban places vary between physical addresses and symbolic representations of
    spaces (landmarks), when their cultural backgrounds were different. A survey questionnaire
    was used to measure cultural background, and a web-based online game was used
    to measure people''s perceptions of places. The attached document is a work-in-progress
    session poster before conducting the data collection and analysis, and the final
    results are presented in the thesis (see the external link). The game website
    for the data collection is available at <a href="https://urban.myeonglee.com"
    target="_blank">https://urban.myeonglee.com</a>, which was developed and redesigned
    based on Daniele Quercia et. al. (2013)''s UrbanOpticon platform.</p> <p>* Thesis
    Committee: Dr. Brian Butler (iSchool, UMD), Dr. Marshini Chetty (iSchool, UMD),
    Dr. Kent Norman (Dept. of Psychology &amp; iSchool, UMD)</p>'
  citation: '<p>Lee, M. &amp; Butler, B. (2014, March). "I know where that is": Cultural
    Differences in Perception of New Places. In <em>iConference 2014 Proceedings</em>.
    pp. 1096-1100. Berlin, Germany. <a href="http://doi.org/10.9776/14390">http://doi.org/10.9776/14390</a></p>
    <p><strong><em>or</em></strong></p> <p>Lee, M. (2014).<em> "I Know Where That
    Is": Cultural Differences in Perception of Places</em>. Master of Information
    Management Thesis. College Park, MD: University of Maryland Press. <a href="http://doi.org/10.13016/M2K893">http://doi.org/10.13016/M2K893</a></p>'
