- year: 2025
  title: 'Leveling Socioeconomic Disparities: The Role of Service Availability in
    School Dropout Rates'
  slug: leveling-socioeconomic-disparities-the-role-of-service-availability-in-school
  authors: Jinyi Kim, Julia H.-P. Hsu, Gahyun Sohn, Gie Myung Lee, Myeong Lee
