- year: 2024
  title: New Kids on the Block? Exploring Onboarding Strategies of Prospective Professionals
    in Cybersecurity
  slug: new-kids-on-the-block-exploring-onboarding-strategies-of-prospective
  authors: Matthew A. Willis, Myeong Lee
  venue: Americas Conference on Information Systems (AMCIS '24). 27. August 15-17.
    Salt Lake City, UT.
  publication_type: Short Paper
  award_note: Selected for Top 25% Papers
  thumbnail: "/assets/images/publications/cybersecurity.jpeg"
  body: "<p>This paper explores how prospective professionals, including those outside
    of educational institutions, approach entering the cybersecurity field. Through
    qualitative interviews with individuals planning a cybersecurity career, we explore
    diverse challenges they face during their journey to enter the profession. Our
    preliminary analysis suggests their challenges may include a lack of awareness
    of occupational culture, insufficient domain-specific language, visibility into
    the practitioner community, and differences in expectations between new and practicing
    professionals. By complementing prior research focused on university education
    and training programs, this work aims to uncover the challenges of individuals
    on a broader spectrum, such as those attempting to change careers and “break in”
    to the profession.</p>"
