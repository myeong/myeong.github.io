  title: 'Local News at a Distance: Psychological Distance and the Formation of News
    Deserts'
  slug: local-news-at-a-distance-psychological-distance-and-the-formation-of-news-deserts
  authors: Tugce Gundogdu, Jieshu Wang, Brian S. Butler, Myeong Lee
