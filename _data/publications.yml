- year: 2011
  title: MapReduce Framework for Swarm Robot Systems
  slug: mapreduce-framework-for-swarm-robot-systems
  authors: Myeong Lee
  venue: Master of Science in Software Engineering Thesis, The Graduate School of
    Convergence Science and Technology, Seoul National University
  publication_type: Thesis
  body: "<p>This was a part of research projects conducted under the Basic Research
    Laboratory Grant from Ministry of Education, Science, and Technology in South
    Korea. This project is two folds: (1) simulating an application of swarm robot
    systems; (2) designing a software framework for the swarm robot systems to reduce
    the complexity of developing applications while minimizing the amount of transmitted
    data by adopting MapReduce paradigm. The video above is a simulation of a swarm
    robot system application that searches for red pillars (foraging). The purpose
    of the swarm robot system was to enhance the surveillance performance of robots
    and to maintain the high intelligence/coverage while reducing the cost of each
    unit. Webot simulator was used to develop the system (written in C++). The second
    part of the project (designing a software framework) was fulfilled for my master's
    thesis. The external link is a link to the master's thesis (written in Korean). </p>
    <p>Thesis Committee: Dr. Seongsoo Hong (Dept. of EE, SNU), Dr. Jung Ho Ahn (Graduate
    School of Convergence Science and Technology, SNU), Dr. Jongwon Kim (Dept. of
    Mechanical Engineering, SNU)</p>"
  citation: "<p>Lee, M. (2011). <em>MapReduce Framework for Swarm Robot Systems</em>.
    Master of Science in Software Engineering Thesis. Seoul, Korea: Seoul National
    University.</p>"
