- year: 2025
  title: Exploring Librarians' Experiences and Perceptions of Public Library Data
    Work
  slug: exploring-librarians-experiences-and-perceptions-of-public-library-data-work
  authors: Jongwook Lee, Sun Jae Park, Myeong Lee, Sanghee Oh
  venue: Journal of Korean Library and Information Science Society, 56(1). 55-77.
  publication_type: Full Paper
  thumbnail: "/assets/images/publications/stat_process.png"
  body: "<p>This study investigates the experiences and concerns of public librarians
    responsible for statistical data management and explores strategies to address
    related challenges. In-depth interviews were conducted with ten librarians handling
    statistical tasks at public libraries in Metropolitan City A and Province B in
    the Yeongnam region. Findings revealed that librarians had established a systematic
    workflow involving data collection, internal verification, data entry, and external
    verification. Effective communication between the overall statistics coordinator
    and department-specific data collectors ensured efficient task distribution and
    discussions on data collection standards. Recognizing the importance of public
    library statistics in performance evaluation and policy development, they employed
    strategies such as utilizing backup data, conducting internal consultations, and
    addressing external inquiries to maintain data accuracy and consistency. Despite
    these efforts, issues such as varying interpretations of survey items, unstable
    data management systems, and data entry errors were reported. This study’s findings
    are expected to improve the understanding of public library statistical tasks
    and contribute to enhancing survey methods and workflow processes.</p> <p> </p>
    <p>The paper is published in Korean. </p>"
