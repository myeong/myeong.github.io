    University of Maryland, partnering with local public libraries, small business
    development centers, economic development organizations, and community advocacy
    groups to bring advanced data analytics and business intelligence services to
    public libraries.
  image: "/assets/images/projects/knext-logo.jpg"
  categories:
  - Community Informatics
  - HCI
  - Information Behavior
  - Info Management
  - Theory
  - Qualitative
  status:
  - Funded
  funding: 'IMLS National Leadership Grants for National Digital Platform, #LG-71-17-0124-17'
  external_link: https://knext.ischool.umd.edu
  body: |-
    <p>KNEXT is a three-year collaborative project between Kent State University (KSU-SLIS) and the University of Maryland (UMD-CIS), which partners with local public libraries, small business development centers, economic development organizations, and community advocacy groups to bring advanced data analytics and business intelligence (DA&amp;BI) services to public libraries in order to support small businesses, entrepreneurs, and community advocates within two recovering communities in Ohio and Maryland. Funded by the Institute of Museum and Library Services’ National Leadership Grants for National Digital Platform, this research project addresses the question: How can we integrate advances in big data and data analytics into libraries as essential community anchors in a way that empowers those communities while encouraging economic development and well-being? Hence, this project addresses two strategic goals of the IMLS: to “promote the use of technology to facilitate discovery of knowledge” within local communities through libraries and promote libraries as community anchors “to enhance civic engagement and economic vitality.”</p>
    <p>* This project was funded by IMLS #LG-71-17-0124-17 (<a href="https://www.imls.gov/sites/default/files/project-proposals/lg-71-17-0124-17-preliminary-proposal.pdf">https://www.imls.gov/sites/default/files/project-proposals/lg-71-17-0124...</a>)<br />*<strong> </strong>PI: Dr. Susan Winter<br />* Senior Researchers: Andrew Fellows and Dr. Joel Chan.<br />* I am contributing to the project by conceptualizing the dynamics of local businesses that are captured from qualitative data analysis through an Information Deserts lens and by analyzing the local information landscapes of local businesses.  </p>
- title: 'Making Information Deserts Visible: Computational Models, Disparities in
    Civic Technology Use, and Urban Decision Making'
  slug: making-information-deserts-visible-computational-models-disparities-in-civic
  description: Research developing a foundational tool for understanding how civic
    technologies are used and how information inequalities manifest in a city. Analyzes
    and visualizes data from Boston's 311 system using computational and qualitative
    approaches.
  image: "/assets/images/projects/311_block_pop.png"
  categories:
  - Big Data
  - Community Informatics
  - Data Management
  - Geospatial
  - HCI
  - Machine Learning
  - Theory
  - Web Application
  - Qualitative
  - Quantitative
  status:
  - Funded
  funding: NSF
  external_link: https://www.nsf.gov/awardsearch/showAward?AWD_ID=1816763
  body: |-
    <p>This research will develop a foundational tool for understanding how civic technologies are used and how information inequalities manifest in a city. User data from new civic technologies that reveal inequalities in the information environments of citizens has only recently become available. Since a large portion of data is demographically or geospatially biased due to varying human-data relationships, computational social scientists have used data modeling and algorithmic techniques to adjust the data and remove biases during data-processing. However, this approach limits our understanding of how and why biased information is created, and our ability to address urban information inequalities and biased data-creation. Consequently, as cities transition to e-government enabled by information and communication technology, they may project the inequities of the past into the smart cities of the future, so a fresh approach is needed. This innovative research analyzes and visualizes data from Boston's 311 system for reporting non-emergency issues to the city government, using computational and qualitative approaches to identify, categorize, and understand the kinds of information disparities that are becoming institutionalized by crowdsourced municipal systems, inhibiting smart city transitions, and perpetuating information deserts. For Boston and its citizens, this research could improve both the function and the equity of the city's 311 system. The resulting insights and tools could also inform other cities' implementation of smart city technologies, identify potential distortions in existing urban datasets, and surface potential corrections that could improve decision making and equitable delivery of services for all residents. </p>
    <p>The research will be performed in three phases. First, six years of civic, census, and geospatial data will be combined with interviews with users, then analyzed to discover the socio-technical dimensions of "information deserts," which are conceptual and physical spaces where local information is poorly embedded in diverse infrastructures and/or less available than in other areas of a city. This research will develop a conceptual model to determine where and how information deserts are located, identify a typology of information deserts based on related community features; and, assess relationships between information deserts and major demographic and geospatial features of data biases. Second, the research team will perform semi-structured interviews with civic stakeholders to gather user requirements for a visual analytics tool as well as to validate the ground truths for the initial models. Based on this, a visual analytics tool will be created to show different types of information deserts, their causes, and anticipated results. Third, through an iterative process, the research team will conduct participatory modeling activities with municipality officials and relevant stakeholders to refine the computational models with local contextual information. Also, the usability of the visual analytics tool will be improved with additional user studies. The resulting conceptual and computational models of information deserts will support a refined visual analytics tool that displays information deserts and their characteristics.</p>
    <p>* I am grateful that this research was accepted to NSF IIS' CHS Program in collaboration with UMD (Dr. Susan Winter, PI), Arizona State University (Dr. Erik Johnston, PI, and Dr. John Harlow, Non-PI Senior Personnel) and Emerson College (Dr. Eric Gordon, PI) (Award #: 1816763)</p>
    <p>* I lead-authored this proposal with PIs and Dr. Harlow. This project will make use of <a href="https://myeonglee.com/publications/how-are-information-deserts-created-theory-local-information-landscapes">a Theory of Local Information Landscapes (LIL theory) and the information deserts framework</a>, which appears in JASIST.</p>
- title: 'Remapping Southside Community: Storytelling Urban Renewal Impact'
  slug: remapping-southside-community-storytelling-urban-renewal-impact
  description: Project building a map-based platform presenting historical documents
    of the nationwide urban renewal project in the 1960s-70s, providing easy-to-use
    interfaces for former residents, archivists, researchers, and citizens.
  image: "/assets/images/projects/urban_renewal.png"
  categories:
  - Community Informatics
  - Data Management
  - Geospatial
  - HCI
  - Software
  - Web Application
  - Qualitative
  status:
  - Funded
  external_link: https://urbanrenewalimpact.org
  body: |-
    <p>This project aims to build a map-based platform that presents historical documents of the nation-wide, urban renewal project in 1960's and 70's and to provide easy-to-use interfaces that can be used by former residents, archivists, researchers, and citizens. Ultimately, this platform aims to reconstruct a virtual neighborhood where people can share their memories by creating social networks of former residents. This project is three-fold: (1) exploring map-based techniques to archive and visualize historical data so to provide diverse access points to the collection, (2) providing structured data by integrating various kinds of databases and navigation tools, and (3) studying value-sensitive design of historically sensitive data platforms in the context of local communities and social justice through interviewing diverse stakeholders. For the map-based techniques, we are currently developing digitization methods using QGIS, ArcGIS, and other geographical/graphical tools to better present old maps and associated information on the online map. Also, user-centered UI design methods are used to develop the user-friendly interfaces.</p>
    <p>* On June 24th, 2021, our team of researchers, community members, and experts held a Stage 1 website launch event virtually. The launching event video available at: <a href="https://www.youtube.com/watch?v=R4hPRMwlbcU">https://www.youtube.com/watch?v=R4hPRMwlbcU</a></p>
    <p>* The website has been built as a storytelling platform: <a href="https://urbanrenewalimpact.org" target="_blank">https://urbanrenewalimpact.org</a></p>
    <p>* I have led a group of undergraduate and graduate students for this project to curate the documents and to design and prototype a map-based system since 2016. </p>
    <p>* This work was presented at the MARAC conference (Fall 2016), the Digital Curation and the Local Community workshop (Spring 2017), IEEE Big Data (Winter 2017), and iConference (Spring 2018).</p>
    <p>* Our team received the Research Improvement Grant (RIG-II) from the UMD iSchool for this project in 2017. </p>
    <p>* 3/20/2023 Asheville Reparation Commission Meeting (demonstrating urban renewal impact): <a href="https://www.youtube.com/watch?v=BLrpQLU_buE">https://www.youtube.com/watch?v=BLrpQLU_buE</a></p>
- title: 'Cycle Atlanta: Seeing Like a Bike'
  slug: cycle-atlanta-seeing-like-a-bike
  description: Creating sensor systems that allow a bike to 'see' its environment
    and collect data as a participatory effort to help the City of Atlanta make informed
    decisions about biking infrastructures. A sensor box equipped with sonars, lidars,
    PM sensors, gas sensors, gyroscope, accelerometer was developed.
  image: "/assets/images/projects/cycle_atlanta.jpg"
  categories:
  - Community Informatics
  - Geospatial
  - HCI
  - Machine Learning
  - Software
  - Hardware
  status:
  - Fellowship
  funding: Data Science for Social Good Fellowship
  body: |-
    <p>The Cycle Atlanta project aims at creating sensor systems that allow a bike to "see" its environment and collect data as a participatory effort so that we can help the City of Atlanta to make informed decisions about biking infrastructures. Specifically, a sensor box equipped with sonars, lidars, PM sensors, gas sensors, gyroscope, accelerometer, and others was developed to detect environmental factors that can give rise to cyclists' stress level. I participated in this project as a Data Science for Social Good (Atlanta's DSSG) Summer fellow in 2017. </p>
    <p>My team mainly worked on (1) reverse-engineering all the prototypes developed previously by the LMC6650 class and consolidating all sensors into two microcontoller units (i.e., Raspberry Pi and Arduino) using the Master-Slave architecture; (2) identifying hardware/software bugs/flaws and refining systems iteratively; (3) implementing fault-tolerent techniques; (4) classifying environmental factors (to detect semantic-level objects) after collecting data using GoPro, voice recorders, and sensors; and (5) visualizing and analyzing the collected data using 3D models and machine learning techniques. My role was to design the system architectures and program on the microcontrollers using Python, C, and shell scripts; to manage the team in developing hardware/software systems, and to analyze data using some signal processing and machine learning techniques (e.g., Fourier/cosine transform, SVM, RandomForest, etc.). </p>
    <p>For the initial attempt to predict the environmental factors using sensor-level signals (only using the cosine-transformed, frequency-level signatures), it was possible to predict up to 50% of target objects when formulating this object-detection task as the 7-bin classification problem. Once the prediction power for the environment detection becomes reasonable by engineering features and collecting more data, the sensory data will become eligible to be used for semantic-level empirical studies that identify the relationships between environmental factors and cyclists' stress level.</p>
    <p>* I am grateful to have this opportunity to work on this project. This is an on-going project at GeorgiaTech led by our amazing PI, Dr. Christopher Le Dantec. </p>
    <p>* Our team members for Atlanta's DSSG 2017 are Javier Argota (CMU), Noel Mannariat (Mahindra Ecole Centrale), Erica Pantoja (Kennesaw State), and myself.</p>
    <p> </p>
    <p> </p>
- title: Open Data Impact Map
  slug: open-data-impact-map
  description: A searchable, centralized database of open data use cases from around
    the world, developed at the Center for Open Data Enterprise. The map shows the
    distribution of organizations worldwide that make use of open data.
  image: "/assets/images/projects/ode.png"
  categories:
  - Data Management
  - Geospatial
  - HCI
  - Info Management
  - Software
  - Web Application
  status:
  - Fellowship
  external_link: http://opendataimpactmap.org
  body: |-
    <p>The Center for Open Data Enterprise is a non-profit organization that aims to maximize the value of open data as a public resource that anyone can use. As a means to promote the impact and value of using open data, the center designed and developed the Open Data Impact map. As a Data Science &amp; Technology Fellow at the Center for Open Data Enterprise, I have worked on the Open Data Impact Map, which is a searchable, centralized database of open data use cases from around the world. The map shows the distribution of organizations in the world that make use of open data. The data have been collected through research, surveys, and interviews. Researchers in the center have conducted quantitative analyses based on these data.</p>
    <p>My role was to lead a team of technology interns in developing a new version of the impact map; the tasks included (1) providing technical directions, (2) designing and implementing a relational database (MySQL), (3) managing the data, and (4) visualizing geo-tagged data using the ArcGIS online map (w/ Leaflet). This experience was very meaningful not only in learning about geospatial systems but also for understanding the impact of social good work on policy and organizations.</p>
    <p>I am grateful for the center's support (Joel Gurin, Laura Manley, and Audrey Ariss) and interns' endeavors in developing the map (thanks to Noah, Vinayak, and Pooja). </p>
- title: Virtual Observatory of Innovation Communities and Ecosystems (VOICE)
  slug: virtual-observatory-of-innovation-communities-and-ecosystems-voice
  description: Building the Virtual Observatory of Innovation Communities and Ecosystems
    (VOICE) that collects, connects, and curates large datasets from multiple sources
    on people, groups, and organizations engaging with multiple innovations.
  image: "/assets/images/projects/cluster_map.jpg"
  categories:
  - Big Data
  - Data Management
  - Geospatial
  - Info Management
  - Theory
  - Quantitative
  status:
  - Funded
  funding: NSF
  external_link: https://www.nsf.gov/awardsearch/showAward?AWD_ID=1546404
  body: |-
    <p>Today's digital revolution is fostering remarkable innovations. The landscape of innovation is rapidly changing and thus difficult to navigate or study. Understanding broader participation in innovation requires large datasets on the innovation participants and their activities. As organizational and industry boundaries become fuzzy in the digitized world, small data analysis cannot fully explain how boundaries shift and evolve. Open innovation leads to overlapping roles of designer and user, making it inadequate to examine innovation development and adoption separately. Therefore, it is necessary to collect data on larger units of analysis encompassing multiple organizations and multiple industries engaging in both the production and use of innovations. Further, the fast pace and risky nature of digital innovations mean that it is no longer sufficient to retrospectively study only successful innovations, but it is important to analyze contemporaneous data on a full range of innovations, including emergent and potentially failing ones, as they unfold. Addressing these challenges in conducting and studying digital innovations, this research team will build the Virtual Observatory of Innovation Communities and Ecosystems (VOICE) that (1) collects, connects, and curates large datasets from multiple sources on the people, groups, and organizations engaging with multiple innovations; (2) employs data science techniques to process and analyze these datasets; and (3) advances an ecology theory of digital innovation.</p>
    <p>The project collects data on Big Data innovations from popular, professional, and trade press; academic publications; press releases; blogs and wikis; and social media. Further, a suite of theory-informed measures and models are developed for characterizing the evolving innovations and their communities in the Big Data ecosystem. Finally, via an open, layered modular information platform, the project's datasets and tools are shared widely and data and tools from other innovation ecosystems can be added as well. The VOICE platform would become a "Hubble Telescope" for everyone to observe and partake in digital innovations beyond those associated with Big Data. Policymakers are able to evaluate the mix of capabilities in innovation communities and recommend necessary interventions to broaden participation, reduce inequality, and cultivate partnerships. By monitoring emergent trends in different but related innovation communities, entrepreneurs and managers would be more likely to develop or adopt the right innovation at the right time. Overall, VOICE enhances the research and education infrastructure that supports individuals from underrepresented backgrounds, students, educators, and other citizens to engage mindfully with science and technology innovations.</p>
    <p>* I have participated in this project as a research collaborator since 2016.</p>
    <p>* This project is supported by the NSF IIS BIGDATA program (PI: Dr. Ping Wang, Co-PIs: Dr. Brian Butler and Dr. Yla Tausczik), Award #1546404.</p>
- title: Mapping Inequality
  slug: mapping-inequality
  description: 'Digitizing portions of National Archives RG195: General Records of
    the Home Owners'' Loan Corporation (HOLC), including surveys, memorandums, and
    maps of American neighborhoods in the 1930s. Working to curate the collection
    and extract text from 75-year-old records.'
  image: "/assets/images/projects/redlining.jpg"
  categories:
  - Community Informatics
  - Data Management
  - Geospatial
  - Software
  - Web Application
  external_link: http://dcicblog.umd.edu/mapping-inequality
  body: |-
    <p>Over the past four years, teams of archivists have digitized portions of National Archives RG195: General Records of the Home Owners’ Loan Corporation [HOLC]. The records include surveys, memorandums, and maps of American neighborhoods in the 1930’s. Now that the records are available digitally, students and faculty members are working to curate the collection and “data-fy” the information contained within. This involves extracting text from digitized 75-year-old records, designing queryable databases to house the information, and disseminating the information, so it is publically accessible. With partners from the University of Richmond, John Hopkins University, and Virginia Tech, the Digital Curation Innovation Center plans to georeference the historical maps and display them on Google Maps, an innovative digital curation technique to visualize changing American neighborhoods.</p>
    <p>I mainly worked on adjusting and developing a crowdsourcing platform called "<strong>Scribe</strong>," which was initially developed by NYPL. This platform provides interfaces and databases that allow many people to transcribe scanned documents collaboratively. My goal was to modify and adjust the platform so that it can be connected to the Redlining app that hosts HOLC documents. This platform is deployed on a production server (running on top of Nginx and Passenger) and being used by student volunteers who transcribe documents in a systematic way. The URL for this platform is: <a href="https://transcribe.ischool.umd.edu">https://transcribe.ischool.umd.edu</a></p>
    <p>This work has been released to numerous newspapers such as National Geographic and NPR. For my interview at the iSchool: <a href="https://ischool.umd.edu/news/ischool-students-contribute-nationally-recognized-project-expose-historically-racist-housing">https://ischool.umd.edu/news/ischool-students-contribute-nationally-reco...</a></p>
- title: On Information Deserts
  slug: on-information-deserts
  description: Proposes the concept of local information landscapes (LIL) to provide
    an ontological understanding of how community-level information looks and conceptualizes
    the material pre-condition of information inequality in a local community as information
    deserts.
  image: "/assets/images/projects/events.png"
  categories:
  - Community Informatics
  - Data Management
  - Geospatial
  - HCI
  - Information Behavior
  - Machine Learning
  - Social Media
  - Theory
  - Web Application
  - Quantitative
  status:
  - Fellowship
  external_link: https://event.myeonglee.com
  body: |-
    <p>Information accessibility problems include diverse types of human- and system-driven barriers that make it difficult for individuals to access desired information. These issues have been studied in two main streams: (1) a human-centered view based on the understand­ing of individual-level characteristics such as physical impairment and economic status, and (2) a technology-focused view that emphasizes system-based factors such as the information filtering techniques and interface designs. Beyond human and system factors, however, pre-existing information sources and their material structures can also affect people’s access to desired information. This work proposes a concept of<em> local information landscapes (LIL)</em> to provide an ontological understanding of how the community-level information looks and conceptualizes the material pre-condition of information inequality in a local community as <em>information deserts</em> based on the LIL framework. Then, using this framework, I aim to analyze real-world data such as local event data to demonstrate the impact of local information landscapes on other community characteristics as an important community-level factor. </p>
    <p>* We had a brainstorming session on this topic at CSST 2015 (Colorado Springs, CO) as a Catalyst Workshop team where team members were Dr. Brian Butler (UMD iSchool), Dr. Rosta Farzan (U of Pitt, iSchool), Claudia Lopez (U of Pitt, iSchool), and myself. An example showcase of this phenomenon is available at the external link.</p>
    <p>* This project is a major topic for my doctoral dissertation.</p>
    <p>* I received a Wylie Dissertation Fellowship from the UMD Graduate School with this research proposal (AY2018-19).</p>
- title: Drupal Course Management Module for UMD Websites
  slug: drupal-course-management-module-for-umd-websites
  description: Designed to provide most up-to-date course information to University
    of Maryland College of Arts and Humanities (ARHU) websites. A Drupal module was
    developed to migrate the university's course catalogs into Drupal databases.
  image: "/assets/images/projects/courses.jpg"
  categories:
  - Data Management
  - Info Management
  - Software
  - Web Application
  external_link: https://github.com/myeong/courses
  body: |-
    <div>This project was designed to provide most up-to-date courses information to University of Maryland College of Arts and Humanities (ARHU) websites. Since most ARHU websites were implemented with Drupal (Content Management System), a Drupal module was developed to migrate the university's course catalogs into Drupal databases. For crawling the course catalogs, Brady Law (CS student)'s Python scripts were modified and re-implemented. Subsequently, Drupal UIs to trigger migrations, Migrate classes that trigger Python scripts, and cron jobs for periodic migrations were developed and implemented as Drupal custom modules. These modules have been deployed in Classics, History, and School of Languages, Literatures, and Cultures (SLLC) websites. The external link is to the Git repository for the modules. </div>
    <div> </div>
    <div>With the support of my awesome mentor Megan Weng, I presented this work at UMD Drupal Users Group's monthly meeting in November 2014.
- title: Human-Robot Interaction via Sound
  slug: human-robot-interaction-via-sound
  description: A robot-human interaction prototype developed at Torooc Inc., a VC-funded
    start-up. Won first-place at the 2012 Start-up Competition by Seoul National University
    R&DB Foundation. Implemented the Time-Difference of Arrival (TDOA) algorithm for
    sound source localization.
  image: "/assets/images/projects/tdoa.jpg"
  categories:
  - HCI
  - Software
  - Hardware
  status:
  - Funded
  - Entrepreneurship
  funding: VC-funded start-up (Torooc Inc.)
  body: "<p>This prototype was an intermediate result of a robot-human interaction
    project conducted at <a href=\"http://torooc.com\" target=\"_blank\">Torooc Inc.,
    a VC-funded start-up company</a> where I was a co-founder and Director of Software
    Development, in 2011. We started up this company through winning the first-place
    prize at the 2012 Start-up Competition by Seoul National University R&amp;DB Foundation
    and Seoul Techno Holdings. </p>\n<p>I first designed microphone amplifier circuits
    using transistors and amplifier chips, respectively. Then, I connected three microphones
    to Texas Instruments' Stellaris LM4F embedded board. On top of that, I implemented
    the <a href=\"https://ieeexplore.ieee.org/abstract/document/4063553/\" target=\"_blank\">Time-Difference
    of Arrival (TDOA) algorithm</a> in C language. Specifically, (1) sound signals
    acquired through 3 microphones were transformed to frequency domain signals using
    Fast Fourier Transform (FFT); (2) the correlation values were calculated; and
    (3) finally the direction of sound source was determined based on the correlation
    values (a.k.a., sound source localization). The motors of the robot prototype
    were controlled using an Arduino board that was receiving the calculated values
    in real time from the Stellaris board. These two boards were separately used due
    to the limitation of Arduino's memory size and servo motors' electrical noises.
    The plastic body of the prototype was built using a 3D printer.</p>\n<p>The picture
    below is a test bed that I built for testing the sound localization algorithm, before
    making the working mock-up.</p>\n<p style=\"text-align: center;\"></p><div class=\"media
    media-element-container media-default\"><div id=\"file-52\" class=\"file file-image
    file-image-jpeg\">\n\n        <h2 class=\"element-invisible\"><a href=\"/file/52\">1st_testbed.jpg</a></h2>\n
    \   \n  \n  <div class=\"content\">\n    <img height=\"2048\" width=\"1536\" style=\"font-size:
    13.008px; height: 667px; width: 500px;\" class=\"media-element file-default\"
    data-delta=\"2\" typeof=\"foaf:Image\" src=\"https://myeonglee.com/sites/default/files/1st_testbed.jpg\"
    alt=\"\" />"
  video: "/assets/videos/tdoa.mp4"
- title: Designing a Future Home Service Robot
  slug: designing-a-future-home-service-robot
  description: In 2010, a team of graduate students from Philosophy, Design, Electrical
    Engineering, and Mechanical Engineering designed a home service robot of the future
    using the Taguchi method for robust hardware design.
  image: "/assets/images/projects/mir.jpg"
  categories:
  - HCI
  - Hardware
  status:
  - Funded
  funding: Seoul National University Brain Fusion Research Fund
  body: |-
    <p>In 2010, a team of graduate students from Philosophy, Design, Electrical Engineering, and Mechanical Engineering worked together to design a home service robot of the future. We initially started with using the<a href="https://en.wikipedia.org/wiki/Taguchi_methods" target="_blank"> Taguchi method</a>, a robust hardware design method, to list the necessary functions of the future robot. Subsequently, we had regular ideation/brainstorming sessions iteratively to come up with future robots that will operate in an automated household environment. I participated in this project as a student researcher (an EE student) and contributed to the software platform, the modular structure of robot functionalities, and business model that can support the robot ecology (e.g., "action store"). The final deliverables were a real-world mock-up design of the robot and a movie clip that shows the functionalities of the robot. </p>
    <p>This project was supported by Seoul National University's Brain Fusion Research Fund (PI: Dr. Jongwon Kim, Dept. of Mechanical Engineering). </p>
