- title: 'SAFETI: Strategic Analysis for Fine-granular Injury and Fatality PrEvenTion
    Insight'
  slug: safeti-strategic-analysis-for-fine-granular-injury-and-fatality-prevention
  description: SAFETI is the first Mason-DOLI Innovation Lab initiative that turns
    more than 15 years of detailed Virginia workplace-accident records into forward-looking,
    preventive insights. Using predictive models, the computational approach estimates
    the likelihood of a fatality occurring within a specific time frame and sector.
  image: "/assets/images/projects/doli_prj.jpeg"
  categories:
  - Big Data
  - Community Informatics
  - Geospatial
  - Machine Learning
  - Quantitative
  status:
  - On-going
  - Funded
  funding: Virginia Department of Labor and Industry (DOLI); AI-in-Gov council
  body: |-
    <p>SAFETI is the first Mason–DOLI Innovation Lab initiative that turns more than 15 years of detailed Virginia workplace-accident records into forward-looking, preventive insights. Using predictive models, the computational approach developed for SAFETI estimates the likelihood of a fatality occurring within a specific time frame and sector, along with its associated probability. This shift from reactive to preventive measures is enabled by advanced spatio-temporal and predictive analytics. By replacing after-the-fact investigations with proactive, data-guided interventions, SAFETI lays the groundwork for regulators, employers, and researchers to target inspections, refine safety practices, and explore new solution spaces that keep Virginia’s workers safer.</p>
    <p>* We are grateful for the generous support from the Virginia Department of Labor and Industry (DOLI). Also, we are grateful for the support of AI-in-Gov council and Dr. Amarda Shehu for supporting this initiative.</p>
    <p>* PIs: Myeong Lee &amp; Kevin Laybarge</p>
- title: 'Visualizing Local Information Inequality in South Korea: An AI-Based Approach
    Using Public Library Data'
  slug: visualizing-local-information-inequality-in-south-korea-an-ai-based-approach
  description: The goal is to understand information inequality across geographical
    regions in South Korea and visualize them using an AI-backed visualization tool.
    A three-year plan revolves around developing an intuitive platform for visualizing
    disparities, constructing metrics for assessing informational inequality based
    on the theory of local information landscapes (LIL theory).
  image: "/assets/images/projects/fig_krf.jpg"
  categories:
  - Big Data
  - Community Informatics
  - Geospatial
  - HCI
  - Info Management
  - Software
  - Qualitative
  - Quantitative
  status:
  - On-going
  - Funded
  funding: 'National Research Foundation of Korea (NRF), Award #2023S1A5A2A21087977'
  body: |-
    <p>The goal of the project is to understand information inequality across geographical regions in South Korea and visualize them using an AI-backed visualization tool. Our plan, spanning three years, revolves around the development of an intuitive platform for the purpose of visualizing these disparities. During the first year, we aim to construct comprehensive metrics for assessing the level of informational inequality, based on the theory of local information landscapes (LIL theory). The subsequent year will be dedicated to the development of a predictive model leveraging artificial intelligence, designed to forecast future trends of inequality. This model will be constructed based on features extracted from survey and open library data. By the final year, our aim is to develop a fully-functioning, user-friendly prototype of an AI-powered platform. This research combines expertise from information science, data science, and information technology. Also, we employ a multifaceted research methodology, incorporating both qualitative and quantitative strategies. The aim extends beyond merely propelling scientific comprehension such as contextualizing LIL theory in the health and education domains; we also aspire to utilize our findings to guide policy-making, thereby augmenting its objectivity and grounding in empirical studies. We endeavor to make this information universally accessible, which we believe will elevate transparency and fortify accountability in decision-making processes. Additionally, the execution and results of this project have the potential to invigorate the data, AI, and platform sectors. One significant outcome we anticipate is enhancing data and AI literacy among local residents and other stakeholders, thereby laying a solid foundation for the development of future educational initiatives. </p>
    <p>* This research is funded by the National Research Foundation of Korea (NRF), an NSF-equivalent in South Korea (Award #2023S1A5A2A21087977).</p>
    <p>* PI: Jongwook Lee (Kyungbuk National University iSchool).<br />* Co-PIs: Myeong Lee (GMU), Sanghee Oh (SKKU), Seungwon Yang (LSU), and Kwonho Choi (KNU). </p>
    <p>* Project Period: June 2023 - May 2026</p>
    <p>* Funding: ₩565,803,000 = $427K</p>
    <p> </p>
- title: 'Mapping Information Ecology: Understanding the Fragmentation of Disability
    Service Information'
  slug: mapping-information-ecology-understanding-the-fragmentation-of-disability-service
  description: Research aiming to provide a comprehensive understanding of the information
    ecology of disability service information by conducting in-depth research on information
    sources, key organizations, and their users. Focuses on Medicaid services for
    people with developmental disabilities in Virginia.
  image: "/assets/images/projects/network.png"
  categories:
  - Community Informatics
  - Info Management
  - Theory
  - Qualitative
  - Quantitative
  status:
  - Funded
  funding: 'Virginia Board for People with Disabilities (VBPD) and U.S. Department
    of Health and Human Services (DHHS), Award #GMU-3-2023'
  external_link: https://vbpd.virginia.gov/grantee/mapping-information-ecology-understanding-the-fragmentation-of-disability/
  body: |-
    <p>As organizations and individuals provide various information to multiple systems within a region, the information becomes fragmented, making it difficult for people to access the necessary information. Individuals have limited resources to navigate all the sources and use only part of the available ones. Disability service information is further fragmented due to diverse actors, ranging from government agencies to for-profit organizations, who often provide only partial information. The complex interactions between these actors make it challenging for information managers to understand the flow of information, which is frequently moderated by policies, market forces, and organizational cultures. Without addressing the complexity of the information ecology, the responsibility of finding necessary information will continue to fall on people with disabilities and their families, negatively impacting their quality of life. Our research aims to provide a comprehensive understanding of the information ecology of disability service information by conducting in-depth research on information sources, key organizations, and their users. Our findings will be reported in numerical, descriptive, and graphical forms that detail the information ecology of disability services in Virginia (with a focus on Medicaid services for people with developmental disabilities). Also, we will identify information providers' key challenges in making information accessible and provides recommendations for improving information accessibility (e.g., enhancing data interopratebiltiy and standardizing data storages), from an information management perspective.</p>
    <p>* Our team is grateful to the sponsors, the Virginia Board for People with Disabilities (VBPD) and the U.S. Department of Health and Human Services (DHHS), Award #GMU-3-2023</p>
    <p>* PI: Myeong Lee (GMU), Co-PI: Katie Pine (ASU)</p>
- title: Exploring How Convergence Methods Foster Shared Accountability to Reveal,
    Map, and Mitigate the Sources and Dynamics of Bias across Social Service Provisioning
    Systems
  slug: exploring-how-convergence-methods-foster-shared-accountability-to-reveal-map-and
  description: Research addressing how civic participation may be better supported
    and bias reduced in the development and integration of systems of care for communities.
    Evaluates the implementation of a system of care in a real-world setting.
  image: "/assets/images/projects/dass.png"
  categories:
  - Big Data
  - Community Informatics
  - HCI
  - Software
  - Qualitative
  - Quantitative
  status:
  - Funded
  funding: NSF
  external_link: https://www.nsf.gov/awardsearch/showAward?AWD_ID=2217706
  body: |-
    <p>Social services, traditionally, have been organized around their missions, such as education or safety or health. A newer approach, called "wrap-around services" or "systems of care," organizes services around individuals and their specific context and needs. These systems face many challenges when applied in real-world settings. Application processes often focus more on the potential of technologies and less on the realities, histories, and needs of communities. The proposed research addresses this gap by evaluating the implementation of a system of care in a real-world setting. The research involves studying how civic participation may be better supported and bias reduced in the development and integration of systems of care for communities. A key outcome of this proposal is to understand the influence of processes inspired by justice, equity, diversity, and inclusion to intentionally check bias and reduce disparities in the design and application of public service provisioning software systems. The goal of the proposed work is to advance accountable software systems through developing generalizable and localizable practices for exploring how to identify specific and systemic sources of bias, improve public service provisioning outcomes, and minimize disparities from biased program outcomes.</p>
    <p>The proposed work builds from existing theory and the project team’s experience in designing and executing software systems that support services to the public. The intent is to identify and map the different types of threats to accountability that can be anticipated within the socio-computational ecosystem of care services. The team is studying dynamics of how bias might propagate across the system through regulations, social contexts, data, and lack of representation in the software development process, among other factors. Once such dynamics are mapped, the team will explore how to attend to bias through a series of interventions planned and conducted in collaboration with community members. These will include mapping the system collaboratively, and holding knowledge convergence workshops, algorithmic impact assessments, and using computational analytic techniques that can augment governance opportunities in the design and deployment of these systems of care. An outcome measure to be tracked through this process is the effectiveness of a system at responding to individual-level threats and creating bias immunity at the systems level through shared stewardship and accountability. The type of products expected from this research are advances in theory (articulation of novel threats, new understandings of dynamics &amp; treatments), specific products related to an algorithmic accountability policy toolkit, and guidelines for practice customizable to local use cases through generalizable convergence workshops.</p>
    <p> </p>
    <p>*The PIs thank the National Science Foundation (NSF) DASS program for funding this project (#2217706). </p>
    <p>*This project has been terminated on 4/25/2025, due to the change of NSF and adminsitration prioirities.</p>
- title: Understanding the Present and Designing the Future of Risk Prediction IT
    in Fire Departments
  slug: understanding-the-present-and-designing-the-future-of-risk-prediction-it-in-fire
  description: Research to develop and design new data-driven risk prediction principles
    and management (DDRPM) tools that anticipate and manage a variety of community
    risks, which fire departments are increasingly required to respond to, including
    medical, fire, and safety emergencies.
  image: "/assets/images/projects/fire.jpg"
  categories:
  - Community Informatics
  - HCI
  - Info Management
  - Theory
  - Qualitative
  status:
  - On-going
  - Funded
  funding: NSF
  external_link: https://www.nsf.gov/awardsearch/showAward?AWD_ID=2211360
  body: |-
    <p>This research will develop and design new data-driven risk prediction principles and management (DDRPM) tools that anticipate and manage a variety of community risks, which fire departments are increasingly required to respond to, including medical, fire, and safety emergencies. Today, much of their work focuses on community risk reduction (CRR), a paradigm that seeks to mitigate risks before they lead to emergencies in the first place. The CRR paradigm will leverage new data-driven risk prediction and management (DDRPM) tools to predict and respond to a variety of community risks. Yet, designing DDRPM tools to realize this vision requires deep understanding of current work practices, and the potential future impacts of such tools on labor (e.g., increased data work), workers (e.g., decreased autonomy), and communities (e.g., intensified surveillance of marginalized populations). Understanding the intersection of sociotechnical work practices for handling risks and the design of data-driven computational tools requires fundamental human-centered computing research. The fire service is key to the health, safety, and security of individuals, communities, and society; thus, this research is primed to provide lasting, practical benefits. This project will directly benefit the study sites and the populations they serve since insights drawn from ethnographic research will be disseminated to study sites and participants.</p>
    <p>This project has multiple goals: (1) comprehensive empirical exploration of community-oriented risk work performed by fire personnel and their associated data work, (2) development of a human-centered design process for the future of DDRPM tools, (3) co-designing speculative DDRPM tools with fire departments, and (4) developing a sociotechnical theory of risk work. It will achieve these goals in three phases. First, it will document current practices of community-focused risk work and community data resources using in-depth ethnographic research in three fire departments. The ethnographic data will be leveraged as part of a novel human-centered design process that combines ethnography, inquiry through design, participatory design, and speculative design. Second, the team of researchers will co-design speculative prototypes for DDRPM in partnership with the study participants. This methodological approach will fill a crucial gap in research and design of sustainable data-driven tools for risk handling by enabling consideration of impacts of design of DDRPM tools on future work practices in the fire service and on communities. Third, the team will evaluate the resulting speculative prototypes to understand how they shift visions of technologically-supported community risk work for the fire service. Both the design process and the co-designed prototypes will be disseminated to the fire service professional community.</p>
    <p>* I am grateful to NSF's HCC program for supporting this project (#2211360). </p>
    <p>* This is a collaborative project between Arizona State University, UC Irvine, and George Mason University. </p>
- title: 'A Visualization Tool and Assessment Framework for Civic Technology Use in
    the DMV Area: The Case of 311 Systems During the COVID-19 Outbreak'
  slug: a-visualization-tool-and-assessment-framework-for-civic-technology-use-in-the-dmv
  description: Research analyzing 311 systems from a socio-technical perspective,
    focusing on how residents re-appropriate civic technology during the COVID-19
    pandemic. Aims to understand the tension between managerial efficiency and citizen
    empowerment.
  image: "/assets/images/projects/dmv.png"
  categories:
  - Big Data
  - Community Informatics
  - Data Management
  - Geospatial
  - Info Management
  - Web Application
  - Qualitative
  - Quantitative
  status:
  - Funded
  funding: NSF
  external_link: https://www.nsf.gov/awardsearch/showAward?AWD_ID=2043900
  body: |-
    <p>The 311 systems that city officials currently deploy can efficiently detect non-emergency civic issues such as potholes and trash. From a socio-technical perspective, residents can re-appropriate the technology for their own purpose adding new capacities and affordances not initially intended. For example, when Hurricane Irma hit Miami in 2017, residents used 311 systems to report disaster-related issues, which led city officials to adapt the system by creating a new category. This user-driven technology re-appropriation has been called the “emancipation process." Although 311 systems have not been designed to facilitate disaster- or pandemic-related communication, individuals use them as critical methods to report issues to the local governments. The COVID-19 pandemic has impacted all aspects of civic infrastructures that range from reduced public transportation systems and the closure of public libraries. These changing norms and the emergence of new issues create a challenge and an opportunity for local governments and publics. If managed well, they can co-produce effective civic technology that addresses pandemic-related issues, systematizes the management of quality services, and can include this effort in local governments’ performance metrics. The success of civic technology for both citizens and local governments lies in understanding the tension between managerial efficiency and citizen empowerment. At its core, we aim to understand how people use the system, how local governments support people’s different uses of the system, and how the different performance metrics of local governments for 311 systems function at the metropolitan area level. We will (1) survey and consolidate local governments’ performance metrics that assess the outcomes of 311 systems in the Washington D.C. metropolitan area (a.k.a., DMV area), (2) analyze their 311 datasets using AI technologies and statistical methods to understand the changes in people’s 311 use patterns in the six jurisdictions in the DMV area during the pandemic, (3) survey city officials to examine how each government has engaged the changing needs of their residents, and (4) build a web-based visualization tool that demonstrates the commonalities among and discrepancies between local governments’ assessment metrics regarding 311 systems. In Stage 1, we propose to achieve these goals by establishing connections with DMV’s jurisdictions through the roundtables organized by our community partner, Connected DMV, and consolidating the inconsistent 311 datasets as a viable unified database.</p>
    <p>* We are grateful for this grant from the NSF S&amp;CC Program (CIVIC Innovation Challenge #2043900) and the support of MetroLab in conducting this project. Also, I thank Shawn Janzen (UMD), George Thomas (Connected DMV), and John Yesawich (Connected DMV) for their input in the proposal. </p>
    <p>* PI: Dr. Myeong Lee (GMU); Co-PI: Dr. Susan Winter (UMD); Community Partner: Connected DMV</p>
    <p> </p>
- title: 'KNEXT: Data Analytics to Support Innovation Communities'
  slug: knext-data-analytics-to-support-innovation-communities
