  body: "<p>Skype's SILK codec was tested as an exploratory project to see if there
    was an opportunity to integrate real-time audio communication with smart TVs.
    This project was conducted as an internship project in LG Electronics' LCD TV
    Research Lab in 2010. Siwon Yang (currently, a developer at Hyundai Mobis) and
    I implemented a VoIP testing program on Linux using C and SLIK codec APIs. The
    video is a demo of the testing program.</p>"
- title: Fundamental Technologies for the Multi-Scale Mass-Deployable Cooperative
    Robots
  slug: fundamental-technologies-for-the-multi-scale-mass-deployable-cooperative-robots
  description: A next-generation robotics paradigm where a large number of robots
    that vary in size cooperate in a hierarchical fashion to collect information in
    various environments. Master's thesis project.
  image: "/assets/images/projects/robots.png"
  categories:
  - Data Management
  - Software
  - Hardware
  status:
  - Funded
  funding: Basic Research Laboratory (BRL) Grant, Ministry of Education, Science,
    and Technology, South Korea
  body: |-
    <p>"Multi-scale mass-deployable cooperative robots are a next-generation robotics paradigm where a large number of robots that vary in size cooperate in a hierarchical fashion to collect information in various environments. While this paradigm can exhibit the effective solution for exploration of the wide area consisting of various types of terrain, its technical maturity is still in its infant stage and many technical hurdles should be resolved to realize this paradigm."  (Choo et al., 2013)</p>
    <p>This project was conducted under the Basic Research Laboratory (BRL) Grant from the Ministry of Education, Science, and Technology in South Korea (FY2009 - 2012). The project was collaborative work of multiple labs from Department of Mechanical Engineering and Department of Electrical Engineering at Seoul National University, Korea.</p>
    <p>I participated in this project as a research assistant and completed my Master's thesis out of this project. </p>
    <p> </p>
- title: Wireless Price Display System
  slug: wireless-price-display-system
  description: A wireless system that substitutes price tags with electrical displays
    in grocery stores. The base station manages a product database and sends price
    information to receiver units via RF. Led to founding student-venture company
    U-Mind Inc. in 2004.
  image: "/assets/images/projects/board.jpg"
  categories:
  - Data Management
  - Software
  - Hardware
  status:
  - Entrepreneurship
  body: |-
    <p>This project was my final team project for "Electrical Engineering Laboratory 3" class in 2004 (when I was junior in college). The goal was to make a wireless system that substitutes price tags with electrical displays in grocery stores. The base station manages a list of products in the database, and it sends out price information to receiver units. Receiver units are simple character displays having unique IDs. When any products' prices change, the system can easily update new prices on these displays. </p>
    <p>In order to implement this system, ARM7 board was used as a base unit that manages a database and transmits price information. RF hardware modules were used for the wireless communication. Receiver units were implemented using 8051 boards. I implemented the LCD control modules for ARM7 (dot LCD display) and 8051 (character LCD display), and a physical-layer wireless communication module for RF chipsets using C language (firmware). </p>
    <p>After the class, I re-implemented the base unit using MFC instead of ARM7 board, so that we can manage the database using MS Access on a desktop computer. Then, my colleagues and I started up a student-venture company called U-Mind Inc. in 2004 with this system. But it lasted only for five months due to the failure to get investment.</p>
